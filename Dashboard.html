<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f6f9;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            margin-top: 0;
            font-size: 20px;
            border-bottom: 1px solid #455a64;
            padding-bottom: 10px;
        }
        .filter-group {
            margin-bottom: 20px;
        }
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .filter-group select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: none;
        }
        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex: 1;
            text-align: center;
        }
        .card h3 {
            margin: 0;
            color: #7f8c8d;
            font-size: 16px;
        }
        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #2980b9;
            margin-top: 10px;
        }
        /* Table Styling */
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #34495e;
            color: white;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard Filters</h2>
        <div class="filter-group">
            <label for="yearFilter">Select Year</label>
            <select id="yearFilter" onchange="filterData()">
                <option value="All">All Years</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="monthFilter">Select Month</label>
            <select id="monthFilter" onchange="filterData()">
