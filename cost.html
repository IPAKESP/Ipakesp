<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Dashboard - Unique Bento Box</title>
    <link rel="icon" href="Logo.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---------------------------------
           PREMIUM THEME VARIABLES
        --------------------------------- */
        :root {
            --color-blue: #3B82F6;
            --color-red: #EF4444;
            --color-yellow: #F59E0B;
            --color-green: #10B981;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-lg: 24px; 
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        /* LIGHT MODE */
        [data-theme="light"] {
            --bg-main: #F4F4F5; 
            --bg-surface: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border-color: #E4E4E7;
            --border-hover: #D4D4D8;
            --grid-line: #F1F5F9;
            --shadow-card: 0 4px 24px -6px rgba(15, 23, 42, 0.08);
            --shadow-hover: 0 12px 32px -8px rgba(15, 23, 42, 0.15); /* New Hover Shadow */
            --bg-input: #F4F4F5;
            --bg-icon: rgba(16, 185, 129, 0.1);
        }

        /* TRUE DARK MODE */
        [data-theme="dark"] {
            --bg-main: #09090B; 
            --bg-surface: #121212; 
            --text-primary: #FAFAFA;
            --text-secondary: #A1A1AA;
            --border-color: #27272A; 
            --border-hover: #3F3F46;
            --grid-line: #18181B;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.8); /* New Hover Shadow Dark */
            --bg-input: #18181B;
            --bg-icon: rgba(16, 185, 129, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background-color: var(--bg-main); color: var(--text-primary);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            transition: var(--transition);
        }

        /* ---------------------------------
           HEADER & NAVIGATION
        --------------------------------- */
        .top-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 30px; background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color); height: 60px;
            box-sizing: border-box; transition: var(--transition);
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-brand h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.3px; text-transform: uppercase;}

        .nav-tabs { display: flex; gap: 8px; align-items: center; }
        .nav-tabs a {
            text-decoration: none; padding: 8px 16px; font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary); border-radius: 20px; transition: var(--transition);
        }
        .nav-tabs a.active { background-color: var(--text-primary); color: var(--bg-surface); }
        .nav-tabs a:hover:not(.active) { color: var(--text-primary); background-color: var(--bg-input); }
        
        .nav-tabs a.home-icon { padding: 8px; display: flex; align-items: center; justify-content: center; }
        .nav-tabs a.home-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        .header-actions { display: flex; align-items: center; gap: 15px; margin-left: 15px; }

        /* Share Menu - Integrated */
        .share-container { position: relative; }
        .share-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--text-primary); color: var(--bg-surface);
            border: none; padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); font-family: inherit;
        }
        .share-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .share-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
        .share-popup {
            position: absolute; top: 120%; right: 0; background: var(--bg-surface);
            border: 1px solid var(--border-color); box-shadow: var(--shadow-card);
            border-radius: var(--radius-md); min-width: 180px; display: none; flex-direction: column;
            overflow: hidden; z-index: 1000;
        }
        .share-popup.show { display: flex; animation: slideDown 0.2s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .share-popup button {
            background: none; border: none; padding: 12px 16px; text-align: left;
            font-size: 0.85rem; font-weight: 600; color: var(--text-primary); cursor: pointer;
            font-family: inherit; transition: var(--transition); display: flex; align-items: center; gap: 10px;
        }
        .share-popup button:hover { background: var(--bg-input); color: var(--color-blue); }
        .share-popup button:not(:last-child) { border-bottom: 1px solid var(--grid-line); }

        .theme-toggle {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 6px; 
        }
        .theme-toggle:hover { border-color: var(--text-secondary); transform: translateY(-1px); }

        /* ---------------------------------
           SLEEK FILTER BAR
        --------------------------------- */
        .filter-bar {
            display: flex; align-items: center; gap: 15px; padding: 10px 30px;
            background-color: var(--bg-main); height: 50px; box-sizing: border-box;
            border-bottom: 1px solid var(--border-color); flex-wrap: nowrap; overflow-x: auto;
        }

        .filter-group { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .filter-group label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group select {
            padding: 6px 28px 6px 12px; border-radius: 20px; border: 1px solid var(--border-color);
            background-color: var(--bg-surface); color: var(--text-primary); font-size: 0.75rem; font-weight: 600;
            font-family: inherit; cursor: pointer; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2371717A%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 10px top 50%; background-size: 8px auto;
            transition: var(--transition);
        }
        .filter-group select:hover { border-color: var(--border-hover); }

        .clear-btn {
            background-color: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);
            padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; margin-left: auto; transition: var(--transition); font-family: inherit;
        }
        .clear-btn:hover { color: var(--text-primary); border-color: var(--text-primary); transform: translateY(-1px); }

        /* ---------------------------------
           UNIQUE BENTO GRID (MOSAIC LAYOUT)
        --------------------------------- */
        .workspace {
            flex: 1; padding: 15px 30px; display: flex; flex-direction: column;
            height: calc(100vh - 110px); box-sizing: border-box; overflow: hidden; position: relative;
        }

        /* 4x3 Asymmetric Mosaic Grid */
        .dashboard-grid {
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr);
            gap: 16px; flex-grow: 1; height: 100%; min-height: 0;
        }

        /* Magic Classes for Asymmetry */
        .col-span-2 { grid-column: span 2; }
        
        .kpi-widget {
            background: var(--bg-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
            padding: 16px 20px; display: flex; flex-direction: column; 
            border: 1px solid var(--border-color);
            transition: var(--transition); position: relative; min-height: 0; overflow: hidden;
        }
        
        /* HOVER EFFECT ADDED HERE */
        .kpi-widget:hover { 
            border-color: var(--text-secondary); 
            transform: translateY(-4px); 
            box-shadow: var(--shadow-hover);
        }

        .kpi-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot.blue { background-color: var(--color-blue); box-shadow: 0 0 8px var(--color-blue); }
        .dot.red { background-color: var(--color-red); box-shadow: 0 0 8px var(--color-red); }
        .dot.yellow { background-color: var(--color-yellow); box-shadow: 0 0 8px var(--color-yellow); }
        .dot.green { background-color: var(--color-green); box-shadow: 0 0 8px var(--color-green); }

        .kpi-title h3 { margin: 0; font-size: 0.75rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .chart-wrapper { position: relative; flex-grow: 1; width: 100%; height: 100%; min-height: 0; }

        /* FADE TRANSITIONS */
        .fade-out { opacity: 0 !important; transform: scale(0.96) !important; }
        .dashboard-grid { transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; transform: scale(1); }

        #loadingMsg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--text-primary); font-weight: 700; background: var(--bg-surface);
            padding: 15px 30px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card); z-index: 10; font-size: 0.9rem;
        }

        /* ---------------------------------
           A4 PRINT LOGIC (Standardized)
        --------------------------------- */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body { background-color: #FFFFFF !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .top-header { border-bottom: 2px solid #E2E8F0; background: #FFFFFF !important; }
            .header-brand h1 { color: #0F172A !important; }
            .nav-tabs, .header-actions, .filter-bar, #loadingMsg, .theme-toggle { display: none !important; }
            .workspace { height: auto !important; overflow: visible !important; padding: 0 !important; }
            .dashboard-grid { grid-template-columns: repeat(4, 1fr) !important; grid-template-rows: auto !important; gap: 10px !important; }
            .kpi-widget { border: 1px solid #E2E8F0 !important; box-shadow: none !important; background: #FFFFFF !important; break-inside: avoid; border-radius: 12px !important; transform: none !important; }
            .kpi-title h3 { color: #0F172A !important; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-brand">
            <img src="Logo.png" alt="Logo" style="height: 35px; width: auto; object-fit: contain;">
            <h1>HR Corporate Dashboard</h1>
        </div>
        <div style="display:flex; align-items:center;">
            <div class="nav-tabs">
                <a href="index.html">HR OPS</a>
                <a href="admin.html">Admin</a>
                <a href="#" class="active">Cost Center</a>
                <a href="transport.html">Transport</a> 
                <a href="index.html" class="home-icon" title="Home">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </a>
            </div>
            
            <div class="header-actions">
                <div class="share-container">
                    <button class="share-btn" id="shareBtn">
                        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8m-4-6l-4-4m0 0L8 6m4-4v16"></path></svg> Expand
                    </button>
                    <div class="share-popup" id="sharePopup">
                        <button id="downloadBtn">📄 Download PDF</button>
                        <button id="printBtn">🖨️ Print (A4 Landscape)</button>
                    </div>
                </div>
                
                <button class="theme-toggle" id="themeToggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark
                </button>
            </div>
        </div>
    </header>

    <div class="filter-bar">
        <div class="filter-group"><label>Year</label><select id="filterYear"><option value="All">All Years</option></select></div>
        <div class="filter-group"><label>Month</label><select id="filterMonth"><option value="All">All Months</option></select></div>
        <div class="filter-group"><label>Company</label><select id="filterCompany"><option value="All">All Companies</option></select></div>
        <button id="clearFiltersBtn" class="clear-btn">Reset View</button>
    </div>

    <div class="workspace">
        <div id="loadingMsg">Fetching live Cost Data...</div>

        <div class="dashboard-grid" id="dashboardContent" style="display: none;">
            
            <div class="kpi-widget col-span-2">
                <div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Mess Cost</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartMessCost"></canvas></div>
            </div>
            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot red"></span><div class="kpi-title"><h3>Cost to Company</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartCTC"></canvas></div>
            </div>
            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot yellow"></span><div class="kpi-title"><h3>Mess Grocery</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartGrocery"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot green"></span><div class="kpi-title"><h3>Veg & Fruits</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartVeg"></canvas></div>
            </div>
            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Meat Cost</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartMeat"></canvas></div>
            </div>
            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot red"></span><div class="kpi-title"><h3>Water Cost</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartWater"></canvas></div>
            </div>
            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot yellow"></span><div class="kpi-title"><h3>Total Cost (Perm)</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartPermTotal"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot green"></span><div class="kpi-title"><h3>Per Head Cost (Perm)</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartPermHead"></canvas></div>
            </div>
            <div class="kpi-widget col-span-2">
                <div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Total Cost (Third Party)</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartTPTotal"></canvas></div>
            </div>
            <div class="kpi-widget">
                <div class="kpi-header"><span class="dot red"></span><div class="kpi-title"><h3>Per Head Cost (TP)</h3></div></div>
                <div class="chart-wrapper"><canvas id="chartTPHead"></canvas></div>
            </div>
            
        </div>
    </div>

    <script>
        // --- THEME & UTILS ---
        Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";
        const themeBtn = document.getElementById('themeToggle');

        function getThemeColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return {
                text: isDark ? '#A1A1AA' : '#64748B',
                grid: isDark ? '#18181B' : '#F1F5F9',
                tooltipBg: isDark ? 'rgba(24, 24, 27, 0.9)' : 'rgba(255, 255, 255, 0.9)',
                tooltipText: isDark ? '#FAFAFA' : '#0F172A',
                tooltipBorder: isDark ? '#3F3F46' : '#E2E8F0',
                pointBg: isDark ? '#FAFAFA' : '#FFFFFF'
            };
        }

        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const isCurrentlyDark = html.getAttribute('data-theme') === 'dark';
            const newTheme = isCurrentlyDark ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            
            themeBtn.innerHTML = newTheme === 'dark' 
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Light`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark`;
            
            triggerUpdate(); // Re-render charts to catch new theme variables
        });

        // Share/Print Popup Logic
        const shareBtn = document.getElementById('shareBtn');
        const sharePopup = document.getElementById('sharePopup');
        shareBtn.addEventListener('click', (e) => { sharePopup.classList.toggle('show'); e.stopPropagation(); });
        document.addEventListener('click', (e) => { if (!sharePopup.contains(e.target) && !shareBtn.contains(e.target)) sharePopup.classList.remove('show'); });
        
        document.getElementById('printBtn').addEventListener('click', () => { sharePopup.classList.remove('show'); setTimeout(() => window.print(), 200); });
        document.getElementById('downloadBtn').addEventListener('click', () => { sharePopup.classList.remove('show'); alert("Print dialog opening. Please select 'Save as PDF'."); setTimeout(() => window.print(), 300); });

        // --- DATA & CHART LOGIC ---
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPcR5zF9y3FOUxNN1b5aiJDRlCjm-8Di1QzcP4BhzefQaeHpClaGeE4_bKkkPA27LqTOje4MoOKEen/pub?gid=1994039092&single=true&output=csv';
        let sheetData = []; let headers = []; const charts = {};
        
        const COLORS = { blue: '#3B82F6', red: '#EF4444', yellow: '#F59E0B', green: '#10B981' };

        function formatNum(num) {
            return num.toLocaleString('en-US', { maximumFractionDigits: 1 });
        }

        function createStandardChart(canvasId, type, colorHex) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const tColors = getThemeColors();
            
            let bg;
            if (type === 'line') {
                let bgGradient = ctx.createLinearGradient(0, 0, 0, 120);
                bgGradient.addColorStop(0, colorHex + '40'); 
                bgGradient.addColorStop(1, colorHex + '00'); 
                bg = bgGradient;
            } else {
                bg = colorHex; // Solid for bars
            }

            return new Chart(ctx, {
                type: type,
                data: { 
                    labels: [], 
                    datasets: [{ 
                        backgroundColor: bg, borderColor: colorHex, 
                        borderWidth: 2, fill: type === 'line', tension: 0.4, 
                        pointRadius: type === 'line' ? 2 : 0, 
                        pointHoverRadius: 5,
                        pointBackgroundColor: tColors.pointBg, 
                        pointBorderColor: colorHex, pointBorderWidth: 2, 
                        borderRadius: type === 'bar' ? 6 : 0,
                        data: [] 
                    }] 
                },
                options: {
                    responsive: true, maintainAspectRatio: false, layout: { padding: { top: 5 } },
                    animation: { duration: 600, easing: 'easeOutQuart' },
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { 
                            backgroundColor: tColors.tooltipBg, titleColor: tColors.tooltipText, bodyColor: tColors.tooltipText,
                            borderColor: tColors.tooltipBorder, borderWidth: 1, padding: 10, cornerRadius: 8,
                            titleFont: { size: 10, family: "'Plus Jakarta Sans', sans-serif" }, 
                            bodyFont: { size: 13, weight: 'bold', family: "'Plus Jakarta Sans', sans-serif" },
                            callbacks: { 
                                label: function(context) { 
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) label += 'Rs ' + formatNum(context.parsed.y);
                                    return label;
                                } 
                            } 
                        } 
                    },
                    scales: { 
                        y: { display: true, beginAtZero: true, grid: { drawBorder: false, color: tColors.grid }, ticks: { display: false } }, 
                        x: { display: true, grid: { display: false }, ticks: { font: { size: 9, weight: '600' }, color: tColors.text, maxRotation: 0 } } 
                    }
                }
            });
        }

        function initCharts() {
            charts.messCost = createStandardChart('chartMessCost', 'bar', COLORS.blue);          
            charts.ctc = createStandardChart('chartCTC', 'bar', COLORS.red);                      
            charts.grocery = createStandardChart('chartGrocery', 'bar', COLORS.yellow);        
            charts.veg = createStandardChart('chartVeg', 'bar', COLORS.green);                  
            charts.meat = createStandardChart('chartMeat', 'bar', COLORS.blue);                  
            charts.water = createStandardChart('chartWater', 'bar', COLORS.red);                  
            charts.permTotal = createStandardChart('chartPermTotal', 'bar', COLORS.yellow);    
            charts.permHead = createStandardChart('chartPermHead', 'line', COLORS.green);        
            charts.tpTotal = createStandardChart('chartTPTotal', 'bar', COLORS.blue);            
            charts.tpHead = createStandardChart('chartTPHead', 'line', COLORS.red);                
        }

        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function findColumn(row, keywords) {
            if(!row) return null;
            return Object.keys(row).find(key => keywords.some(kw => key.toLowerCase().includes(kw)));
        }

        function cleanNumber(val) {
            if (val === undefined || val === null || val.toString().trim() === '') return 0;
            if (typeof val === 'number') return val;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            let num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }

        function populateDropdowns() {
            if (sheetData.length === 0) return;
            const monthColRaw = findColumn(sheetData[0], ['month', 'mahina']);
            const compColRaw = findColumn(sheetData[0], ['company', 'comp']);

            const years = new Set(), months = new Set(), companies = new Set();

            sheetData.forEach(row => {
                let mRaw = monthColRaw ? (row[monthColRaw] || "") : "";
                if(mRaw && mRaw.includes('-')) {
                    let parts = mRaw.split('-');
                    months.add(parts[0].trim());
                    let yr = "20" + parts[1].trim();
                    years.add(yr); 
                    row['ExtractedYear'] = yr;
                    row['ExtractedMonth'] = parts[0].trim();
                } else if (mRaw) {
                    months.add(mRaw.trim());
                    row['ExtractedMonth'] = mRaw.trim();
                    row['ExtractedYear'] = "All"; 
                }

                let cRaw = compColRaw ? row[compColRaw] : null;
                if (cRaw && cRaw.toLowerCase() !== 'group') companies.add(cRaw.trim());
            });

            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                select.innerHTML = `<option value="All">All</option>`;
                dataSet.forEach(val => { if(val) select.innerHTML += `<option value="${val}">${val}</option>`; });
            };

            addOptions('filterYear', years); addOptions('filterMonth', months); addOptions('filterCompany', companies);
        }

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(csvUrl); const csvText = await response.text();
                const rows = parseCSV(csvText);
                if (!rows || rows.length === 0) throw new Error("Sheet is empty");

                let headerIdx = 0;
                for(let i=0; i<Math.min(15, rows.length); i++) {
                    let rowStr = rows[i].join("").toLowerCase().replace(/\s/g, '');
                    if(rowStr.includes("month") || rowStr.includes("company") || rowStr.includes("cost")) { headerIdx = i; break; }
                }

                headers = rows[headerIdx].map(h => h ? h.trim() : `Col_${Math.random()}`);
                sheetData = rows.slice(headerIdx + 1).map(row => {
                    let obj = {};
                    row.forEach((cell, i) => { if(headers[i]) obj[headers[i]] = cell ? cell.trim() : ""; });
                    return obj;
                });
                sheetData = sheetData.filter(row => Object.values(row).some(x => x !== ""));

                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'grid'; 

                populateDropdowns(); updateDashboard(); 
            } catch (error) { document.getElementById('loadingMsg').innerHTML = `Error loading data. Check sheet format.`; }
        }

        function triggerUpdate() {
            const elementsToFade = document.querySelectorAll('#dashboardContent');
            elementsToFade.forEach(el => el.classList.add('fade-out'));
            setTimeout(() => {
                updateDashboard();
                elementsToFade.forEach(el => el.classList.remove('fade-out'));
            }, 300);
        }

        function updateDashboard() {
            if(sheetData.length === 0) return;

            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedComp = document.getElementById('filterCompany').value;
            const compCol = findColumn(sheetData[0], ['company', 'comp']);

            let filteredData = sheetData.filter(item => {
                let match = true;
                if(selectedComp === "All" && compCol && item[compCol] && item[compCol].toLowerCase() === 'group') return false;
                if(selectedComp !== "All" && compCol && item[compCol] !== selectedComp) match = false;
                if(selectedYear !== "All" && item['ExtractedYear'] !== selectedYear) match = false;
                if(selectedMonth !== "All" && item['ExtractedMonth'] !== selectedMonth) match = false;
                return match;
            });

            const grocCol = findColumn(sheetData[0], ['mess grocery', 'grocery']);
            const waterCol = findColumn(sheetData[0], ['water']);
            const vegCol = findColumn(sheetData[0], ['vegitables', 'fruits', 'veg']);
            const meatCol = findColumn(sheetData[0], ['meat']);
            const messCostCol = findColumn(sheetData[0], ['mess cost']);
            const ctcCol = findColumn(sheetData[0], ['cost to company', 'ctc']);
            const permTotCol = findColumn(sheetData[0], ['permanent employee cost - total', 'permanent total', 'perm total']);
            const permHeadCol = findColumn(sheetData[0], ['permanent - per employee cost', 'permanent per head', 'perm head']);
            const tpTotCol = findColumn(sheetData[0], ['third party employee cost', 'third party total', 'tp total']);
            const tpHeadCol = findColumn(sheetData[0], ['third party - per employee cost', 'tp per head', 'tp head']);

            let groupedStats = {};
            filteredData.forEach(item => {
                let label = item['ExtractedMonth'] || "Unknown";
                let vGroc = cleanNumber(item[grocCol]), vWat = cleanNumber(item[waterCol]), vVeg = cleanNumber(item[vegCol]);
                let vMeat = cleanNumber(item[meatCol]), vMCost = cleanNumber(item[messCostCol]), vCTC = cleanNumber(item[ctcCol]);
                let vPTot = cleanNumber(item[permTotCol]), vTPTot = cleanNumber(item[tpTotCol]);
                let vPHead = cleanNumber(item[permHeadCol]), vTPHead = cleanNumber(item[tpHeadCol]);

                if (!groupedStats[label]) groupedStats[label] = { gr:0, wa:0, vg:0, me:0, mc:0, ctc:0, pt:0, tpt:0, ph_s:0, ph_c:0, tph_s:0, tph_c:0 };

                groupedStats[label].gr += vGroc; groupedStats[label].wa += vWat; groupedStats[label].vg += vVeg;
                groupedStats[label].me += vMeat; groupedStats[label].mc += vMCost; groupedStats[label].ctc += vCTC;
                groupedStats[label].pt += vPTot; groupedStats[label].tpt += vTPTot;
                if(vPHead > 0) { groupedStats[label].ph_s += vPHead; groupedStats[label].ph_c++; }
                if(vTPHead > 0) { groupedStats[label].tph_s += vTPHead; groupedStats[label].tph_c++; }
            });

            let labels = Object.keys(groupedStats);
            const monthOrder = { "jan":1, "feb":2, "mar":3, "apr":4, "may":5, "jun":6, "jul":7, "aug":8, "sep":9, "oct":10, "nov":11, "dec":12 };
            labels.sort((a, b) => (monthOrder[a.toLowerCase().substring(0,3)] || 99) - (monthOrder[b.toLowerCase().substring(0,3)] || 99));

            let dMC=[], dCTC=[], dGr=[], dVg=[], dMe=[], dWa=[], dPTot=[], dPHead=[], dTPTot=[], dTPHead=[];
            labels.forEach(lbl => {
                let s = groupedStats[lbl];
                dMC.push(s.mc); dCTC.push(s.ctc); dGr.push(s.gr); dVg.push(s.vg); dMe.push(s.me); dWa.push(s.wa);
                dPTot.push(s.pt); dTPTot.push(s.tpt);
                dPHead.push(s.ph_c > 0 ? parseFloat((s.ph_s / s.ph_c).toFixed(1)) : 0);
                dTPHead.push(s.tph_c > 0 ? parseFloat((s.tph_s / s.tph_c).toFixed(1)) : 0);
            });

            const tColors = getThemeColors();
            
            function updateC(chartInst, lbs, dta) {
                if(chartInst) {
                    chartInst.data.labels = lbs;
                    chartInst.data.datasets[0].data = dta;
                    
                    // Update theme colors dynamically
                    chartInst.options.scales.x.ticks.color = tColors.text;
                    chartInst.options.scales.y.grid.color = tColors.grid;
                    chartInst.options.plugins.tooltip.backgroundColor = tColors.tooltipBg;
                    chartInst.options.plugins.tooltip.titleColor = tColors.tooltipText;
                    chartInst.options.plugins.tooltip.bodyColor = tColors.tooltipText;
                    chartInst.options.plugins.tooltip.borderColor = tColors.tooltipBorder;
                    if(chartInst.config.type === 'line') chartInst.data.datasets[0].pointBackgroundColor = tColors.pointBg;

                    chartInst.update();
                }
            }

            updateC(charts.messCost, labels, dMC); updateC(charts.ctc, labels, dCTC); updateC(charts.grocery, labels, dGr);
            updateC(charts.veg, labels, dVg); updateC(charts.meat, labels, dMe); updateC(charts.water, labels, dWa);
            updateC(charts.permTotal, labels, dPTot); updateC(charts.permHead, labels, dPHead);
            updateC(charts.tpTotal, labels, dTPTot); updateC(charts.tpHead, labels, dTPHead);
        }

        document.querySelectorAll('select').forEach(select => select.addEventListener('change', triggerUpdate));
        document.getElementById('clearFiltersBtn').addEventListener('click', () => { document.querySelectorAll('select').forEach(select => select.value = 'All'); triggerUpdate(); });
        window.onload = () => { initCharts(); fetchGoogleSheetData(); };
    </script>
</body>
