<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate & Sales Dashboard</title>
    <link rel="icon" href="Logo.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---------------------------------
           PREMIUM THEME VARIABLES
        --------------------------------- */
        :root {
            --color-blue: #3B82F6;
            --color-red: #EF4444;
            --color-yellow: #F59E0B;
            --color-green: #10B981;
            --color-purple: #8B5CF6;
            --color-pink: #EC4899;
            --color-cyan: #06B6D4;
            --color-indigo: #4F46E5;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --radius-lg: 20px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        [data-theme="light"] {
            --bg-main: #F8FAFC;
            --bg-surface: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border-color: #E2E8F0;
            --border-hover: #CBD5E1;
            --shadow-card: 0 4px 20px -2px rgba(15, 23, 42, 0.05);
            --bg-input: #F1F5F9;
        }

        [data-theme="dark"] {
            --bg-main: #09090B;
            --bg-surface: #121212;
            --text-primary: #FAFAFA;
            --text-secondary: #A1A1AA;
            --border-color: #27272A;
            --border-hover: #3F3F46;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
            --bg-input: #18181B;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background-color: var(--bg-main); color: var(--text-primary);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* HEADER & NAVIGATION */
        .top-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 30px; background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color); height: 60px;
            box-sizing: border-box; transition: var(--transition);
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-brand h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.3px; }

        .theme-toggle {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 6px;
        }
        .theme-toggle:hover { border-color: var(--text-secondary); }

        /* FILTER BAR */
        .filter-bar {
            display: flex; align-items: center; justify-content: flex-start; gap: 15px; padding: 15px 30px;
            background-color: var(--bg-main); box-sizing: border-box; flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color); z-index: 5; position: relative;
        }

        .filter-group { display: flex; align-items: center; gap: 8px; background: var(--bg-surface); padding: 6px 16px; border-radius: 30px; border: 1px solid var(--border-color); box-shadow: var(--shadow-card); }
        .filter-group label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; }
        .filter-group select {
            padding: 4px 24px 4px 0; border: none; background: transparent;
            color: var(--text-primary); font-size: 0.8rem; font-weight: 700;
            font-family: inherit; cursor: pointer; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2371717A%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right top 50%; background-size: 10px auto;
        }

        .clear-btn {
            background-color: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);
            padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; margin-left: auto;
        }

        /* WORKSPACE & GRID */
        .workspace {
            flex: 1; padding: 25px 30px 40px 30px; display: flex; flex-direction: column;
            overflow-y: auto; box-sizing: border-box; position: relative; gap: 40px;
        }

        .section-title {
            margin: 0 0 15px 0; font-size: 1.4rem; font-weight: 800; color: var(--text-primary);
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before {
            content: ''; display: block; width: 6px; height: 24px;
            background: var(--color-blue); border-radius: 4px;
        }

        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            grid-auto-flow: dense; gap: 24px; align-content: flex-start;
        }

        .kpi-widget {
            background: var(--bg-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
            padding: 24px; display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid var(--border-color); position: relative; overflow: hidden; min-height: 200px;
        }

        .span-col-2 { grid-column: span 2; }
        .span-row-2 { grid-row: span 2; min-height: 400px; }
        @media (max-width: 900px) { .span-col-2 { grid-column: span 1; } .span-row-2 { grid-row: span 1; min-height: 200px; } }

        .kpi-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; position: relative; z-index: 2; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .kpi-title h3 { margin: 0; font-size: 0.8rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
        
        .kpi-value-container { position: relative; z-index: 2; margin-top: auto; }
        .kpi-value { font-size: 2.5rem; font-weight: 800; color: var(--text-primary); line-height: 1; letter-spacing: -1px; margin-bottom: 8px; }
        .kpi-trend { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); }

        .chart-bg-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60%; opacity: 0.9; z-index: 1; padding: 0 10px;
        }
        /* Make line charts transparent in background, but bar charts fully visible */
        .chart-bg-wrapper.type-line { opacity: 0.25; pointer-events: none; padding: 0; }

        #loadingMsg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--text-primary); font-weight: 700; background: var(--bg-surface);
            padding: 15px 30px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card); z-index: 10; display: flex; align-items: center; gap: 10px;
        }
        .spinner { width: 20px; height: 20px; border: 3px solid var(--border-color); border-top-color: var(--color-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-brand">
            <h1>Executive Dashboard</h1>
        </div>
        <button class="theme-toggle" id="themeToggle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark
        </button>
    </header>

    <div class="filter-bar">
        <div class="filter-group"><label>Year</label><select id="filterYear"><option value="All">All</option></select></div>
        <div class="filter-group"><label>Month</label><select id="filterMonth"><option value="All">All</option></select></div>
        <div class="filter-group"><label>Company</label><select id="filterCompany"><option value="All">All</option></select></div>
        <div class="filter-group"><label>Department</label><select id="filterDept"><option value="All">All</option></select></div>
        <div class="filter-group" id="regionFilterGroup" style="display:none;"><label>Region</label><select id="filterRegion"><option value="All">All</option></select></div>
        <button id="clearFiltersBtn" class="clear-btn">Reset View</button>
    </div>

    <div class="workspace">
        <div id="loadingMsg"><div class="spinner"></div> Fetching Live Data...</div>
        
        <div>
            <h2 class="section-title" style="--color-blue: var(--color-red);">Safety & Compliance</h2>
            <div class="dashboard-grid" id="safetyContent"></div>
        </div>

        <div>
            <h2 class="section-title" style="--color-blue: var(--color-indigo);">Sales & Revenue</h2>
            <div class="dashboard-grid" id="salesContent"></div>
        </div>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerHTML = isDark 
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line></svg> Light`;
            
            Chart.defaults.color = isDark ? '#64748B' : '#A1A1AA';
            Object.values(kpiCharts).forEach(chart => chart.update());
        });

        // --- CONFIGURATION ---
        const urlSafety = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPzzR8TLIYXF774RZcCdomSXwlWVuwJIG8YsfimKg1y29I1zGSq0r8GYum2hP_-28F8KbsH6_3GtJt/pub?gid=1558196711&single=true&output=csv';
        const urlSales = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPzzR8TLIYXF774RZcCdomSXwlWVuwJIG8YsfimKg1y29I1zGSq0r8GYum2hP_-28F8KbsH6_3GtJt/pub?gid=0&single=true&output=csv';

        let safetyDataRaw = [], salesDataRaw = [];
        let kpiCharts = {};

        // KPIs Definitions
        const safetyKPIs = [
            { id: "fatality", title: "Fatality Rate", matchKeys: ["fatality", "death"], calcType: "avg", isPercent: false, gridClass: "span-col-2", color: "#EF4444", chartType: "line" },
            { id: "safety", title: "Training Compliance", matchKeys: ["safety", "training", "compliance"], calcType: "avg", isPercent: true, gridClass: "", color: "#3B82F6", chartType: "line" },
            { id: "ltifr", title: "Lost Time Injury (LTIFR)", matchKeys: ["ltifr", "lost time", "lti"], calcType: "avg", isPercent: false, gridClass: "", color: "#EC4899", chartType: "line" },
            { id: "trir", title: "Total Recordable (TRIR)", matchKeys: ["trir", "recordable", "incident"], calcType: "avg", isPercent: false, gridClass: "span-col-2", color: "#06B6D4", chartType: "line" }
        ];

        const salesKPIs = [
            { id: "revenue", title: "Total Revenue / Sales", matchKeys: ["revenue", "sales", "turnover"], calcType: "sum", isPercent: false, gridClass: "span-col-2 span-row-2", color: "#4F46E5", chartType: "bar" },
            { id: "profit", title: "Net Profit", matchKeys: ["profit", "net income"], calcType: "sum", isPercent: false, gridClass: "span-col-2", color: "#10B981", chartType: "bar" },
            { id: "volume", title: "Sales Volume", matchKeys: ["volume", "qty", "quantity"], calcType: "sum", isPercent: false, gridClass: "", color: "#F59E0B", chartType: "bar" },
            { id: "target", title: "Target Achieved", matchKeys: ["target", "achievement"], calcType: "avg", isPercent: true, gridClass: "", color: "#8B5CF6", chartType: "bar" }
        ];

        // --- HELPER FUNCTIONS ---
        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function formatData(csvText) {
            const rows = parseCSV(csvText);
            if(rows.length < 2) return { data: [], headers: [] };
            const headers = rows[0].map(h => h.trim().replace(/\n/g, ' '));
            const data = rows.slice(1).map(row => {
                let obj = {};
                row.forEach((cell, i) => { obj[headers[i]] = cell ? cell.trim() : ""; });
                return obj;
            }).filter(row => Object.values(row).some(x => x !== ""));
            return { data, headers };
        }

        function cleanNum(val) {
            if (!val) return 0;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                let currentVal = (easeProgress * (end - start) + start);
                
                if (Number.isInteger(end) || end > 1000) {
                    obj.innerHTML = Math.floor(currentVal).toLocaleString('en-US');
                } else {
                    obj.innerHTML = currentVal.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                }
                
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // --- APP INITIALIZATION ---
        async function initApp() {
            try {
                const [resSafety, resSales] = await Promise.all([ fetch(urlSafety), fetch(urlSales) ]);
                const safetyCSV = await resSafety.text();
                const salesCSV = await resSales.text();

                const parsedSafety = formatData(safetyCSV);
                const parsedSales = formatData(salesCSV);

                safetyDataRaw = { data: parsedSafety.data, headers: parsedSafety.headers };
                salesDataRaw = { data: parsedSales.data, headers: parsedSales.headers };

                document.getElementById('loadingMsg').style.display = 'none';
                
                populateFilters();
                renderDashboards();
            } catch (error) {
                document.getElementById('loadingMsg').innerHTML = "Error loading data. Check console.";
                console.error(error);
            }
        }

        function populateFilters() {
            const years = new Set(), months = new Set(), companies = new Set(), depts = new Set(), regions = new Set();
            
            const processFilters = (dataset) => {
                let colYear = dataset.headers.find(h => h.toLowerCase().includes('year'));
                let colMonth = dataset.headers.find(h => h.toLowerCase().includes('month'));
                let colComp = dataset.headers.find(h => h.toLowerCase().includes('company'));
                let colDept = dataset.headers.find(h => h.toLowerCase().includes('department'));
                let colReg = dataset.headers.find(h => h.toLowerCase().includes('region') || h.toLowerCase().includes('zone'));

                dataset.data.forEach(row => {
                    if(colYear && row[colYear]) years.add(row[colYear]);
                    if(colMonth && row[colMonth]) months.add(row[colMonth]);
                    if(colComp && row[colComp]) companies.add(row[colComp]);
                    if(colDept && row[colDept]) depts.add(row[colDept]);
                    if(colReg && row[colReg]) regions.add(row[colReg]);
                });
            };

            processFilters(safetyDataRaw);
            processFilters(salesDataRaw);

            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                if(!select) return;
                select.innerHTML = '<option value="All">All</option>';
                dataSet.forEach(val => { let opt = document.createElement('option'); opt.value = val; opt.innerHTML = val; select.appendChild(opt); });
                select.addEventListener('change', renderDashboards);
            };

            addOptions('filterYear', years);
            addOptions('filterMonth', months);
            addOptions('filterCompany', companies);
            addOptions('filterDept', depts);
            
            if(regions.size > 0) {
                document.getElementById('regionFilterGroup').style.display = 'flex';
                addOptions('filterRegion', regions);
            }

            document.getElementById('clearFiltersBtn').addEventListener('click', () => {
                document.querySelectorAll('.filter-bar select').forEach(s => s.value = 'All');
                renderDashboards();
            });
        }

        // --- RENDERING ENGINE ---
        function renderDashboards() {
            // Destroy old charts
            Object.values(kpiCharts).forEach(chart => chart.destroy());
            kpiCharts = {};

            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedComp = document.getElementById('filterCompany').value;
            const selectedDept = document.getElementById('filterDept').value;
            const selectedRegion = document.getElementById('filterRegion') ? document.getElementById('filterRegion').value : "All";

            const filterData = (dataset) => {
                let h = dataset.headers.map(x => x.toLowerCase());
                let colYear = dataset.headers[h.findIndex(x => x.includes('year'))];
                let colMonth = dataset.headers[h.findIndex(x => x.includes('month'))];
                let colComp = dataset.headers[h.findIndex(x => x.includes('company'))];
                let colDept = dataset.headers[h.findIndex(x => x.includes('department') || x.includes('dept'))];
                let colReg = dataset.headers[h.findIndex(x => x.includes('region') || x.includes('zone'))];

                return dataset.data.filter(row => {
                    if (selectedYear !== "All" && colYear && row[colYear] !== selectedYear) return false;
                    if (selectedMonth !== "All" && colMonth && row[colMonth] !== selectedMonth) return false;
                    if (selectedComp !== "All" && colComp && row[colComp] !== selectedComp) return false;
                    if (selectedDept !== "All" && colDept && row[colDept] !== selectedDept) return false;
                    if (selectedRegion !== "All" && colReg && row[colReg] !== selectedRegion) return false;
                    return true;
                });
            };

            const filteredSafety = filterData(safetyDataRaw);
            const filteredSales = filterData(salesDataRaw);

            renderSection(filteredSafety, safetyDataRaw.headers, safetyKPIs, 'safetyContent', selectedMonth);
            renderSection(filteredSales, salesDataRaw.headers, salesKPIs, 'salesContent', selectedMonth);
        }

        function renderSection(data, headers, kpiDefs, containerId, selectedMonth) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; color: var(--text-secondary); text-align:center;">No data matches your filters for this section.</div>`;
                return;
            }

            // Find key columns
            let hLower = headers.map(x => x.toLowerCase());
            let colMonth = headers[hLower.findIndex(x => x.includes('month'))];
            let colKPI = headers[hLower.findIndex(x => x === 'kpi' || x === 'metric' || x === 'indicator')];
            let colAchieved = headers[hLower.findIndex(x => x === 'achieved' || x === 'value' || x === 'actual')];

            kpiDefs.forEach((kpi) => {
                let trendMap = {}; 
                let total = 0; let count = 0; let hasData = false;

                data.forEach(row => {
                    let val = null;
                    let m = colMonth ? row[colMonth] : "Unknown";

                    // Hybrid Check: Long format (KPI col) vs Wide format (KPI is a header)
                    if (colKPI && colAchieved) {
                        let rowKpiName = (row[colKPI] || "").toLowerCase();
                        if (kpi.matchKeys.some(kw => rowKpiName.includes(kw.toLowerCase()))) {
                            val = cleanNum(row[colAchieved]);
                        }
                    } else {
                        // Wide format fallback
                        let matchedHeader = headers.find(h => kpi.matchKeys.some(kw => h.toLowerCase().includes(kw.toLowerCase())));
                        if (matchedHeader && row[matchedHeader] !== undefined) {
                            val = cleanNum(row[matchedHeader]);
                        }
                    }

                    if (val !== null && !isNaN(val)) {
                        hasData = true;
                        total += val; count++;
                        if(!trendMap[m]) trendMap[m] = { sum: 0, count: 0 };
                        trendMap[m].sum += val;
                        trendMap[m].count += 1;
                    }
                });

                if (!hasData) return;

                let displayValue = (kpi.calcType === "avg" && count > 0) ? (total / count) : total;
                
                // Prepare Chart Data (Grouped by Month)
                let labels = Object.keys(trendMap);
                let chartDataValues = labels.map(l => kpi.calcType === "avg" ? (trendMap[l].sum / trendMap[l].count) : trendMap[l].sum);

                // Build HTML
                const cardId = `kpi-${kpi.id}`;
                const chartId = `chart-${kpi.id}`;
                
                container.insertAdjacentHTML('beforeend', `
                    <div class="kpi-widget ${kpi.gridClass}" id="${cardId}">
                        <div>
                            <div class="kpi-header">
                                <span class="dot" style="background-color: ${kpi.color}; box-shadow: 0 0 8px ${kpi.color}"></span>
                                <div class="kpi-title"><h3>${kpi.title}</h3></div>
                            </div>
                            <div class="kpi-value-container">
                                <div class="kpi-value" id="val-${kpi.id}">0</div>
                                <div class="kpi-trend">${selectedMonth === "All" ? 'YTD ' + (kpi.calcType==='avg'?'Average':'Total') : 'Monthly Metric'}</div>
                            </div>
                        </div>
                        <div class="chart-bg-wrapper type-${kpi.chartType}">
                            <canvas id="${chartId}"></canvas>
                        </div>
                    </div>
                `);

                const valEl = document.getElementById(`val-${kpi.id}`);
                animateValue(valEl, 0, displayValue, 1000);
                if(kpi.isPercent) setTimeout(() => { valEl.innerHTML += '<span style="font-size:0.5em">%</span>'; }, 1050);

                // Render Chart (Bar for Sales, Line for Safety)
                if (labels.length > 0 && selectedMonth === "All") {
                    const ctx = document.getElementById(chartId).getContext('2d');
                    
                    let chartOptions = {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: kpi.chartType === 'bar' ? {
                                enabled: true,
                                backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                titleFont: { size: 13, family: "'Plus Jakarta Sans', sans-serif" },
                                bodyFont: { size: 14, weight: 'bold', family: "'Plus Jakarta Sans', sans-serif" },
                                padding: 12, cornerRadius: 8, displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        let v = context.parsed.y;
                                        return v > 1000 ? v.toLocaleString('en-US') : v.toFixed(1);
                                    }
                                }
                            } : { enabled: false }
                        },
                        scales: {
                            x: { display: kpi.chartType === 'bar', grid: { display: false }, ticks: { font: { family: "'Plus Jakarta Sans', sans-serif", size: 10 } } },
                            y: { display: false, beginAtZero: true }
                        },
                        layout: { padding: kpi.chartType === 'bar' ? { top: 20 } : 0 }
                    };

                    let datasetConfig = {
                        data: chartDataValues,
                        backgroundColor: kpi.color,
                        borderColor: kpi.color,
                        borderWidth: kpi.chartType === 'line' ? 2 : 0,
                        borderRadius: kpi.chartType === 'bar' ? 4 : 0,
                        fill: kpi.chartType === 'line',
                        tension: 0.4,
                        pointRadius: 0
                    };

                    if (kpi.chartType === 'line') {
                        let gradient = ctx.createLinearGradient(0, 0, 0, 150);
                        gradient.addColorStop(0, kpi.color + '80'); gradient.addColorStop(1, 'transparent');
                        datasetConfig.backgroundColor = gradient;
                    }

                    kpiCharts[kpi.id] = new Chart(ctx, { type: kpi.chartType, data: { labels: labels, datasets: [datasetConfig] }, options: chartOptions });
                }
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
