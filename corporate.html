<script>
        // --- THEME TOGGLE LOGIC ---
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerHTML = isDark 
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg> Light`;
            
            Chart.defaults.color = isDark ? '#64748B' : '#A1A1AA';
            Object.values(kpiCharts).forEach(chart => chart.update());
        });

        // --- DATA FETCHING & PARSING LOGIC ---
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPzzR8TLIYXF774RZcCdomSXwlWVuwJIG8YsfimKg1y29I1zGSq0r8GYum2hP_-28F8KbsH6_3GtJt/pub?gid=1558196711&single=true&output=csv';
        let rawData = [];
        let headers = [];
        let kpiCharts = {};
        
        // Naye columns add kiye hain
        let colYear = null, colMonth = null, colComp = null, colDept = null;
        let colKPI = null, colAchieved = null;

        // SMART MAPPING: Ab yeh column ki bajaye 'KPI' column ki row values mein in words ko dhoondega
        const specificKPIs = [
            { id: "fatality", title: "Fatality Rate", matchKeys: ["fatality", "death"], calcType: "avg", isPercent: false, gridClass: "span-col-2 span-row-2", color: "#EF4444" },
            { id: "safety", title: "Safety Training Compliance", matchKeys: ["safety", "training", "compliance"], calcType: "avg", isPercent: true, gridClass: "", color: "#3B82F6" },
            { id: "risk", title: "Risk Assessment Coverage", matchKeys: ["risk", "assessment", "coverage"], calcType: "avg", isPercent: true, gridClass: "span-col-2", color: "#8B5CF6" },
            { id: "env", title: "Environmental Non-Compliance", matchKeys: ["environment", "environmental", "non compliance", "non-compliance"], calcType: "sum", isPercent: false, gridClass: "", color: "#F59E0B" },
            { id: "ltifr", title: "Lost Time Injury (LTIFR)", matchKeys: ["ltifr", "lost time", "lti"], calcType: "avg", isPercent: false, gridClass: "span-row-2", color: "#EC4899" },
            { id: "trir", title: "Total Recordable (TRIR)", matchKeys: ["trir", "recordable", "incident"], calcType: "avg", isPercent: false, gridClass: "span-col-2", color: "#06B6D4" },
            { id: "nearmiss", title: "Near-Miss Reporting", matchKeys: ["near miss", "near-miss", "near"], calcType: "avg", isPercent: false, gridClass: "", color: "#10B981" }
        ];

        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function findColumn(keywords) {
            return headers.find(h => keywords.some(kw => h.toLowerCase().includes(kw.toLowerCase())));
        }

        async function initApp() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                headers = rows[0].map(h => h.trim().replace(/\n/g, ' '));
                console.log("📝 Sheet Columns Found:", headers);
                
                rawData = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((cell, i) => { obj[headers[i]] = cell ? cell.trim() : ""; });
                    return obj;
                }).filter(row => Object.values(row).some(x => x !== ""));

                // Filter dropdowns aur KPI columns map kar rahe hain
                colYear = findColumn(['year']);
                colMonth = findColumn(['month']);
                colComp = findColumn(['company']);
                colDept = findColumn(['department']);
                colKPI = findColumn(['kpi']);             // KPI column dhond raha hai
                colAchieved = findColumn(['achieved']);   // Achieved value column dhoond raha hai

                document.getElementById('loadingMsg').style.display = 'none';
                populateFilters();
                renderDashboard();
            } catch (error) {
                document.getElementById('loadingMsg').innerHTML = "Failed to load data. Please check the console.";
                console.error("Data Fetching Error:", error);
            }
        }

        function populateFilters() {
            const years = new Set(), months = new Set(), companies = new Set(), depts = new Set();
            
            rawData.forEach(row => {
                if(colYear && row[colYear]) years.add(row[colYear]);
                if(colMonth && row[colMonth]) months.add(row[colMonth]);
                if(colComp && row[colComp]) companies.add(row[colComp]);
                if(colDept && row[colDept]) depts.add(row[colDept]);
            });
            
            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                if(!select) return;
                select.innerHTML = '<option value="All">All</option>';
                dataSet.forEach(val => {
                    let opt = document.createElement('option');
                    opt.value = val; opt.innerHTML = val; select.appendChild(opt);
                });
                select.addEventListener('change', renderDashboard);
            };

            addOptions('filterYear', years);
            addOptions('filterMonth', months);
            addOptions('filterCompany', companies);
            addOptions('filterDept', depts);
            
            document.getElementById('clearFiltersBtn').addEventListener('click', () => {
                document.querySelectorAll('.filter-bar select').forEach(s => s.value = 'All');
                renderDashboard();
            });
        }

        function cleanNum(val) {
            if (!val) return 0;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                let currentVal = (easeProgress * (end - start) + start);
                
                if (Number.isInteger(end)) {
                    obj.innerHTML = Math.floor(currentVal).toLocaleString('en-US');
                } else {
                    obj.innerHTML = currentVal.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                }
                
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardContent');
            
            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedComp = document.getElementById('filterCompany').value;
            const selectedDept = document.getElementById('filterDept').value;
            
            let filteredData = rawData.filter(row => {
                if (selectedYear !== "All" && colYear && row[colYear] !== selectedYear) return false;
                if (selectedMonth !== "All" && colMonth && row[colMonth] !== selectedMonth) return false;
                if (selectedComp !== "All" && colComp && row[colComp] !== selectedComp) return false;
                if (selectedDept !== "All" && colDept && row[colDept] !== selectedDept) return false;
                return true;
            });

            container.innerHTML = '';
            kpiCharts = {};

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px; font-weight: 700;">No data found for the selected filters. Please adjust your criteria.</div>`;
                return;
            }

            let cardsGenerated = 0;

            specificKPIs.forEach((kpiDef) => {
                // Agar sheet mein KPI aur Achieved column nahi milte to ruk jao
                if (!colKPI || !colAchieved) return; 

                let total = 0; let count = 0;
                let trendData = []; let trendLabels = [];
                let hasData = false;

                filteredData.forEach(row => {
                    // Check karein ke row ka KPI hamare required KPI se match karta hai ya nahi
                    let rowKpiName = (row[colKPI] || "").toLowerCase();
                    let isMatch = kpiDef.matchKeys.some(kw => rowKpiName.includes(kw.toLowerCase()));

                    if (isMatch) {
                        hasData = true;
                        let rawVal = row[colAchieved];
                        if (rawVal !== undefined && rawVal !== "") {
                            let val = cleanNum(rawVal);
                            total += val;
                            count++;
                            
                            if (colMonth && selectedMonth === "All") {
                                trendLabels.push(row[colMonth]);
                                trendData.push(val);
                            }
                        }
                    }
                });

                // Sirf wo cards draw karo jinka data sheet mein mila hai
                if (!hasData) return;
                cardsGenerated++;

                let displayValue = 0;
                if (count > 0) {
                    displayValue = (kpiDef.calcType === "avg") ? (total / count) : total;
                }

                const cardId = `kpi-card-${kpiDef.id}`;
                const chartId = `kpi-chart-${kpiDef.id}`;
                let trendText = selectedMonth === "All" ? `Accumulated ${kpiDef.calcType === 'avg' ? 'Average' : 'Total'}` : "Specific Month Metric";
                
                const cardHTML = `
                    <div class="kpi-widget ${kpiDef.gridClass}" id="${cardId}">
                        <div>
                            <div class="kpi-header">
                                <span class="dot" style="background-color: ${kpiDef.color}; box-shadow: 0 0 8px ${kpiDef.color}"></span>
                                <div class="kpi-title"><h3>${kpiDef.title}</h3></div>
                            </div>
                            <div class="kpi-value-container">
                                <div class="kpi-value" id="val-${kpiDef.id}">0</div>
                                <div class="kpi-trend">${trendText}</div>
                            </div>
                        </div>
                        <div class="chart-bg-wrapper">
                            <canvas id="${chartId}"></canvas>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);

                const valEl = document.getElementById(`val-${kpiDef.id}`);
                animateValue(valEl, 0, displayValue, 1000);
                
                // Add % sign if required
                if(kpiDef.isPercent) {
                    setTimeout(() => { valEl.innerHTML += '<span style="font-size:0.5em">%</span>'; }, 1050);
                }

                // Render Chart
                if (trendData.length > 1 && selectedMonth === "All") {
                    const ctx = document.getElementById(chartId).getContext('2d');
                    let bgGradient = ctx.createLinearGradient(0, 0, 0, 100);
                    bgGradient.addColorStop(0, kpiDef.color + '60'); 
                    bgGradient.addColorStop(1, 'transparent'); 

                    kpiCharts[kpiDef.id] = new Chart(ctx, {
                        type: 'line',
                        data: { labels: trendLabels, datasets: [{ data: trendData, borderColor: kpiDef.color, backgroundColor: bgGradient, borderWidth: 2, fill: true, pointRadius: 0, tension: 0.4 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false, min: Math.min(...trendData) * 0.9 } }, layout: { padding: 0 } }
                    });
                }
            });

            // DEBUGGING FALLBACK:
            if (cardsGenerated === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: var(--color-red); padding: 40px; font-weight: 700; background: var(--bg-surface); border-radius: 20px;">
                        Data load hua hai lekin "KPI" aur "Achieved" columns mein koi matching data nahi mila.<br>
                        <span style="font-size: 0.8rem; color: var(--text-secondary);">Sheet Columns Found: ${headers.join(', ')}</span>
                    </div>
                `;
            }
        }

        window.onload = initApp;
    </script>
