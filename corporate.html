<script>
        // --- THEME TOGGLE LOGIC ---
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerHTML = isDark 
                ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark`
                : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg> Light`;
            
            Chart.defaults.color = isDark ? '#64748B' : '#A1A1AA';
            Object.values(kpiCharts).forEach(chart => chart.update());
        });

        // --- DATA FETCHING & PARSING LOGIC ---
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPzzR8TLIYXF774RZcCdomSXwlWVuwJIG8YsfimKg1y29I1zGSq0r8GYum2hP_-28F8KbsH6_3GtJt/pub?gid=1558196711&single=true&output=csv';
        let rawData = [];
        let headers = [];
        let kpiCharts = {};
        let specificKPIs = []; 
        
        let colYear = null, colMonth = null, colComp = null, colDept = null;
        let colKPI = null, colAchieved = null, colTarget = null;

        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc === '\n' && !quote) { ++row; col = 0; continue; }
                if (cc === '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function findColumn(keywords) {
            return headers.find(h => keywords.some(kw => h.toLowerCase().includes(kw.toLowerCase())));
        }

        function generateDynamicKPIs(data) {
            if (!colKPI) return [];
            let kpiMap = new Map();
            
            data.forEach(row => {
                let kpiName = row[colKPI];
                if (!kpiName) return;
                kpiName = kpiName.trim();
                let key = kpiName.toLowerCase();
                if (!kpiMap.has(key)) kpiMap.set(key, kpiName);
            });

            const colors = ["#3B82F6", "#10B981", "#8B5CF6", "#F59E0B", "#EC4899", "#06B6D4", "#EF4444", "#F97316", "#14B8A6", "#6366F1"];
            const gridClasses = ["", "", "span-col-2", "", "", ""]; 

            return Array.from(kpiMap.values()).map((name, index) => {
                const lowerName = name.toLowerCase();
                const isPercent = lowerName.includes('compliance') || lowerName.includes('rate') || lowerName.includes('%') || lowerName.includes('coverage');
                const isAvg = isPercent || lowerName.includes('ltifr') || lowerName.includes('trir') || lowerName.includes('average');

                return {
                    id: "kpi_" + index,
                    title: name,
                    matchKeys: [name.toLowerCase()],
                    calcType: isAvg ? "avg" : "sum",
                    isPercent: isPercent,
                    gridClass: gridClasses[index % gridClasses.length],
                    color: colors[index % colors.length]
                };
            });
        }

        async function initApp() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                headers = rows[0].map(h => h.trim().replace(/\n/g, ' '));
                
                rawData = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((cell, i) => { obj[headers[i]] = cell ? cell.trim() : ""; });
                    return obj;
                }).filter(row => Object.values(row).some(x => x !== ""));

                colYear = findColumn(['year']);
                colMonth = findColumn(['month']);
                colComp = findColumn(['company']);
                colDept = findColumn(['department']);
                colKPI = findColumn(['kpi']);
                colAchieved = findColumn(['achieved']);
                colTarget = findColumn(['target', 'tgt']); 

                specificKPIs = generateDynamicKPIs(rawData);

                document.getElementById('loadingMsg').style.display = 'none';
                populateFilters();
                renderDashboard();
            } catch (error) {
                document.getElementById('loadingMsg').innerHTML = "Failed to load data. Please check the console.";
                console.error("Data Fetching Error:", error);
            }
        }

        function populateFilters() {
            const years = new Set(), months = new Set(), companies = new Set(), depts = new Set();
            
            rawData.forEach(row => {
                if(colYear && row[colYear]) years.add(row[colYear]);
                if(colMonth && row[colMonth]) months.add(row[colMonth]);
                if(colComp && row[colComp]) companies.add(row[colComp]);
                if(colDept && row[colDept]) depts.add(row[colDept]);
            });
            
            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                if(!select) return;
                select.innerHTML = '<option value="All">All</option>';
                dataSet.forEach(val => {
                    let opt = document.createElement('option');
                    opt.value = val; opt.innerHTML = val; select.appendChild(opt);
                });
                select.addEventListener('change', renderDashboard);
            };

            addOptions('filterYear', years);
            addOptions('filterMonth', months);
            addOptions('filterCompany', companies);
            addOptions('filterDept', depts);
            
            document.getElementById('clearFiltersBtn').addEventListener('click', () => {
                document.querySelectorAll('.filter-bar select').forEach(s => s.value = 'All');
                renderDashboard();
            });
        }

        function cleanNum(val) {
            if (!val) return 0;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                let currentVal = (easeProgress * (end - start) + start);
                
                if (Number.isInteger(end)) {
                    obj.innerHTML = Math.floor(currentVal).toLocaleString('en-US');
                } else {
                    obj.innerHTML = currentVal.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                }
                
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardContent');
            
            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedComp = document.getElementById('filterCompany').value;
            const selectedDept = document.getElementById('filterDept').value;
            
            let filteredData = rawData.filter(row => {
                if (selectedYear !== "All" && colYear && row[colYear] !== selectedYear) return false;
                if (selectedMonth !== "All" && colMonth && row[colMonth] !== selectedMonth) return false;
                if (selectedComp !== "All" && colComp && row[colComp] !== selectedComp) return false;
                if (selectedDept !== "All" && colDept && row[colDept] !== selectedDept) return false;
                return true;
            });

            container.innerHTML = '';
            kpiCharts = {};

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px; font-weight: 700;">No data found for the selected filters.</div>`;
                return;
            }

            let cardsGenerated = 0;

            specificKPIs.forEach((kpiDef) => {
                if (!colKPI || !colAchieved) return; 

                let total = 0; let count = 0;
                let targetTotal = 0; let targetCount = 0;
                let targetSymbol = ""; // Symbol save karne ke liye
                let trendData = []; let trendLabels = [];
                let hasData = false;

                filteredData.forEach(row => {
                    let rowKpiName = (row[colKPI] || "").toLowerCase();
                    let isMatch = kpiDef.matchKeys.includes(rowKpiName);

                    if (isMatch) {
                        hasData = true;
                        let rawVal = row[colAchieved];
                        if (rawVal !== undefined && rawVal !== "") {
                            let val = cleanNum(rawVal);
                            total += val;
                            count++;
                            
                            if (colMonth && selectedMonth === "All") {
                                trendLabels.push(row[colMonth]);
                                trendData.push(val);
                            }
                        }

                        // Target metric accumulation with Symbol Extraction
                        if (colTarget && row[colTarget] !== undefined && row[colTarget] !== "") {
                            let rawTarget = row[colTarget].toString().trim();
                            
                            // Check if target starts with ≥, ≤, >, <, =
                            if (!targetSymbol) {
                                let match = rawTarget.match(/^([<>≥≤=]\s*)/);
                                if (match) targetSymbol = match[1];
                            }
                            
                            targetTotal += cleanNum(rawTarget);
                            targetCount++;
                        }
                    }
                });

                if (!hasData) return;
                cardsGenerated++;

                let displayValue = 0;
                if (count > 0) {
                    displayValue = (kpiDef.calcType === "avg") ? (total / count) : total;
                }

                // Target Formatting logic updated
                let displayTargetText = "-";
                if (targetCount > 0) {
                    let tgtVal = (kpiDef.calcType === "avg") ? (targetTotal / targetCount) : targetTotal;
                    let numberPart = Number.isInteger(tgtVal) ? tgtVal.toLocaleString('en-US') : tgtVal.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                    
                    // Attach Symbol and Percentage back
                    displayTargetText = targetSymbol + numberPart;
                    if (kpiDef.isPercent && !displayTargetText.includes('%')) {
                        displayTargetText += "%";
                    }
                }

                const cardId = `kpi-card-${kpiDef.id}`;
                const chartId = `kpi-chart-${kpiDef.id}`;
                let trendText = selectedMonth === "All" ? `${kpiDef.calcType === 'avg' ? 'Avg' : 'Total'}` : "Month Metric";
                
                const cardHTML = `
                    <div class="kpi-widget ${kpiDef.gridClass}" id="${cardId}">
                        <div class="kpi-target">Target: ${displayTargetText}</div>
                        <div>
                            <div class="kpi-header">
                                <span class="dot" style="background-color: ${kpiDef.color}; box-shadow: 0 0 8px ${kpiDef.color}"></span>
                                <div class="kpi-title"><h3>${kpiDef.title}</h3></div>
                            </div>
                            <div class="kpi-value-container">
                                <div class="kpi-value" id="val-${kpiDef.id}">0</div>
                                <div class="kpi-trend">${trendText}</div>
                            </div>
                        </div>
                        <div class="chart-bg-wrapper">
                            <canvas id="${chartId}"></canvas>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);

                const valEl = document.getElementById(`val-${kpiDef.id}`);
                animateValue(valEl, 0, displayValue, 1000);
                
                if(kpiDef.isPercent) {
                    setTimeout(() => { valEl.innerHTML += '<span style="font-size:0.5em">%</span>'; }, 1050);
                }

                if (trendData.length > 1 && selectedMonth === "All") {
                    const ctx = document.getElementById(chartId).getContext('2d');
                    let bgGradient = ctx.createLinearGradient(0, 0, 0, 80);
                    bgGradient.addColorStop(0, kpiDef.color + '45'); 
                    bgGradient.addColorStop(1, 'transparent'); 

                    kpiCharts[kpiDef.id] = new Chart(ctx, {
                        type: 'line',
                        data: { labels: trendLabels, datasets: [{ data: trendData, borderColor: kpiDef.color, backgroundColor: bgGradient, borderWidth: 1.5, fill: true, pointRadius: 0, tension: 0.4 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false, min: Math.min(...trendData) * 0.9 } }, layout: { padding: 0 } }
                    });
                }
            });

            if (cardsGenerated === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--color-red); padding: 40px; font-weight: 700;">No matching KPI metrics found.</div>`;
            }
        }

        window.onload = initApp;
    </script>
