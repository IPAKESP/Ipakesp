<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Google Material Design Variables */
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            
            --bg-blue-light: rgba(66, 133, 244, 0.1);
            --bg-red-light: rgba(234, 67, 53, 0.1);
            --bg-yellow-light: rgba(251, 188, 5, 0.1);
            --bg-green-light: rgba(52, 168, 83, 0.1);

            --bg-light: #F8F9FA;
            --surface: #FFFFFF;
            --text-main: #202124;
            --text-muted: #5F6368;
            --border-color: #DADCE0;
            --header-height: 80px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column; 
            background-color: var(--bg-light);
            color: var(--text-main);
            height: 100vh;
        }

        /* ---------------------------------
           FULL-WIDTH TOP HEADER
        --------------------------------- */
        .top-header {
            width: 100%;
            height: var(--header-height);
            background-color: var(--surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            z-index: 200;
            position: fixed;
            top: 0;
            left: 0;
            box-sizing: border-box;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 50px; 
            width: auto;
            object-fit: contain;
            margin-right: 20px;
        }

        .top-header h1 {
            color: var(--google-blue);
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ---------------------------------
           LAYOUT WRAPPER (Below Header)
        --------------------------------- */
        .layout-container {
            display: flex;
            margin-top: var(--header-height); 
            height: calc(100vh - var(--header-height));
        }

        /* Clean Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--surface);
            border-right: 1px solid var(--border-color);
            padding: 25px 20px;
            overflow-y: auto;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h2 {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #F1F3F4;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group select:focus {
            background: var(--surface);
            border-color: var(--google-blue);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: transparent;
            color: var(--google-blue);
            border: 1px solid var(--google-blue);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
        }

        .clear-btn:hover {
            background-color: rgba(66, 133, 244, 0.08);
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 30px 40px;
            overflow-y: auto;
            box-sizing: border-box;
            position: relative;
        }

        /* ---------------------------------
           NAVIGATION TABS (UPDATED)
        --------------------------------- */
        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-tabs a {
            text-decoration: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-tabs a:hover {
            color: var(--text-main);
            background-color: var(--bg-light);
            border-color: #c0c4c9;
        }

        .nav-tabs a.active {
            background-color: var(--google-green);
            color: white;
            border-color: var(--google-green);
            box-shadow: 0 2px 6px rgba(52, 168, 83, 0.3);
        }

        .nav-tabs a.home-icon {
            margin-left: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
            background-color: white;
        }

        .nav-tabs a.home-icon:hover {
            background-color: var(--bg-light);
        }

        .nav-tabs a.home-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Unified Card & Graph Widget Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-widget {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1), 0 1px 2px rgba(60,64,67,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 4px solid var(--border-color);
            padding: 18px 20px 10px 20px;
        }

        /* Cyclic Google Colors matching the Charts exactly */
        .kpi-widget:nth-child(4n+1) { border-top-color: var(--google-blue); }
        .kpi-widget:nth-child(4n+2) { border-top-color: var(--google-red); }
        .kpi-widget:nth-child(4n+3) { border-top-color: var(--google-yellow); }
        .kpi-widget:nth-child(4n+4) { border-top-color: var(--google-green); }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .kpi-title h3 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .chart-wrapper {
            position: relative;
            height: 140px; 
            width: 100%;
        }

        #loadingMsg {
            position: absolute;
            color: var(--google-blue);
            font-weight: 500;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="Logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h1>Corporate Dashboard</h1>
    </header>

    <div class="layout-container">
        
        <div class="sidebar">
            <h2>Filters</h2>
            <div class="filter-group">
                <label>Year</label>
                <select id="filterYear"><option value="All">All Years</option></select>
            </div>
            <div class="filter-group">
                <label>Month</label>
                <select id="filterMonth"><option value="All">All Months</option></select>
            </div>
            <div class="filter-group">
                <label>Surveyor Name</label>
                <select id="filterSurveyor"><option value="All">All Surveyors</option></select>
            </div>
            <div class="filter-group">
                <label>Location</label>
                <select id="filterLocation"><option value="All">All Locations</option></select>
            </div>
            <button id="clearFiltersBtn" class="clear-btn">Clear Filters</button>
        </div>

        <div class="main-content">
            
            <div class="nav-tabs">
                <a href="index.html">HR Dashboard</a>
                <a href="#" class="active">Admin Dashboard</a>
                <a href="cost.html">Cost Dashboard</a>
                
                <a href="index.html" class="home-icon" title="Home">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </div>

            <div id="loadingMsg">Fetching live data...</div>

            <div class="dashboard-grid" id="dashboardContent" style="display: none;">
                
                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Overall Service Level</h3><div class="kpi-value" id="valArea1">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea1"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Cleanliness SLA</h3><div class="kpi-value" id="valArea2">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea2"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Security SLA</h3><div class="kpi-value" id="valArea3">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea3"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Maintenance SLA</h3><div class="kpi-value" id="valArea4">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea4"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Food Quality SLA</h3><div class="kpi-value" id="valArea5">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea5"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Transport SLA</h3><div class="kpi-value" id="valArea6">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea6"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Staff Behavior SLA</h3><div class="kpi-value" id="valArea7">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea7"></canvas></div>
                </div>

                <div class="kpi-widget">
                    <div class="kpi-header"><div class="kpi-title"><h3>Timeliness SLA</h3><div class="kpi-value" id="valArea8">...</div></div></div>
                    <div class="chart-wrapper"><canvas id="chartArea8"></canvas></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // NEW ADMIN SHEET LINK
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPcR5zF9y3FOUxNN1b5aiJDRlCjm-8Di1QzcP4BhzefQaeHpClaGeE4_bKkkPA27LqTOje4MoOKEen/pub?gid=508898650&single=true&output=csv';

        let sheetData = [];
        let headers = [];
        const charts = {};

        const G_BLUE = '#4285F4'; const G_RED = '#EA4335'; const G_YELLOW = '#FBBC05'; const G_GREEN = '#34A853';
        const BG_BLUE = 'rgba(66, 133, 244, 0.15)'; const BG_RED = 'rgba(234, 67, 53, 0.15)'; const BG_YELLOW = 'rgba(251, 188, 5, 0.15)'; const BG_GREEN = 'rgba(52, 168, 83, 0.15)';

        function parseCSV(str) {
            const arr = []; let quote = false; let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function findColumn(row, keywords) {
            if(!row) return null;
            return Object.keys(row).find(key => keywords.some(kw => key.toLowerCase().includes(kw)));
        }

        function cleanNumber(val) {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function formatAvg(num) {
            return num.toFixed(1) + "%"; // Percent formatting for SLAs
        }

        // Standard Chart Setup Function
        function createChart(canvasId, type, colorLine, colorBg) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: type,
                data: { 
                    labels: [], 
                    datasets: [{ 
                        backgroundColor: type === 'line' ? colorBg : colorLine, 
                        borderColor: colorLine,
                        borderWidth: 2,
                        fill: type === 'line', 
                        tension: 0.4,
                        pointRadius: 3,
                        borderRadius: type === 'bar' ? 4 : 0,
                        data: [] 
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 800, easing: 'easeOutQuart' },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { titleFont: { size: 11 }, bodyFont: { size: 11 } }
                    },
                    scales: { 
                        y: { 
                            display: true, 
                            beginAtZero: true, 
                            grid: { drawBorder: false, color: '#f1f3f4' },
                            ticks: { font: { size: 10 }, color: '#9aa0a6' }
                        },
                        x: { 
                            display: true, 
                            grid: { display: false },
                            ticks: { font: { size: 10 }, color: '#9aa0a6', maxRotation: 45, minRotation: 0 }
                        }
                    }
                }
            });
        }

        function initCharts() {
            // Setup 8 trend line charts for Admin SLAs
            charts.area1 = createChart('chartArea1', 'line', G_BLUE, BG_BLUE);
            charts.area2 = createChart('chartArea2', 'line', G_RED, BG_RED);
            charts.area3 = createChart('chartArea3', 'line', G_YELLOW, BG_YELLOW);
            charts.area4 = createChart('chartArea4', 'line', G_GREEN, BG_GREEN);
            
            charts.area5 = createChart('chartArea5', 'line', G_BLUE, BG_BLUE);
            charts.area6 = createChart('chartArea6', 'line', G_RED, BG_RED);
            charts.area7 = createChart('chartArea7', 'line', G_YELLOW, BG_YELLOW);
            charts.area8 = createChart('chartArea8', 'line', G_GREEN, BG_GREEN);
        }

        function populateDropdowns() {
            // Find Filter Columns based on generic names
            const monthColRaw = findColumn(sheetData[0], ['month', 'mahina', 'date']);
            const survColRaw = findColumn(sheetData[0], ['surveyour', 'surveyor', 'name']);
            const locColRaw = findColumn(sheetData[0], ['location', 'site', 'plant', 'area']);

            const years = new Set();
            const months = new Set();
            const surveyors = new Set();
            const locations = new Set();

            sheetData.forEach(row => {
                let mRaw = row[monthColRaw] || "";
                if(mRaw.includes('-')) {
                    let parts = mRaw.split('-');
                    let mth = parts[0].trim();
                    let yr = (parts[1].length === 2 ? "20" : "") + parts[1].trim();
                    months.add(mth);
                    years.add(yr); 
                    row['ExtractedYear'] = yr;
                    row['ExtractedMonth'] = mth;
                } else {
                    months.add(mRaw.trim());
                    row['ExtractedMonth'] = mRaw.trim();
                    row['ExtractedYear'] = "All"; 
                }

                if(survColRaw && row[survColRaw]) surveyors.add(row[survColRaw].trim());
                if(locColRaw && row[locColRaw]) locations.add(row[locColRaw].trim());
            });

            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                select.innerHTML = `<option value="All">All</option>`;
                dataSet.forEach(val => {
                    if(!val) return;
                    let opt = document.createElement('option');
                    opt.value = val; opt.innerHTML = val;
                    select.appendChild(opt);
                });
            };

            addOptions('filterYear', years);
            addOptions('filterMonth', months);
            addOptions('filterSurveyor', surveyors);
            addOptions('filterLocation', locations);
        }

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                headers = rows[0].map(h => h.trim());
                
                sheetData = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((cell, i) => { obj[headers[i]] = cell ? cell.trim() : ""; });
                    return obj;
                });

                sheetData = sheetData.filter(row => Object.values(row).some(x => x !== ""));

                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'grid'; 

                populateDropdowns();
                updateDashboard(); 
            } catch (error) {
                console.error("Data loading error:", error);
                document.getElementById('loadingMsg').innerHTML = "Failed to load data. Check console.";
            }
        }

        function updateDashboard() {
            if(sheetData.length === 0) return;

            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedSurv = document.getElementById('filterSurveyor').value;
            const selectedLoc = document.getElementById('filterLocation').value;

            const survCol = findColumn(sheetData[0], ['surveyour', 'surveyor', 'name']);
            const locCol = findColumn(sheetData[0], ['location', 'site', 'plant', 'area']);

            let filteredData = sheetData.filter(item => {
                let match = true;
                if(selectedYear !== "All" && item['ExtractedYear'] !== selectedYear) match = false;
                if(selectedMonth !== "All" && item['ExtractedMonth'] !== selectedMonth) match = false;
                if(selectedSurv !== "All" && survCol && item[survCol] !== selectedSurv) match = false;
                if(selectedLoc !== "All" && locCol && item[locCol] !== selectedLoc) match = false;
                return match;
            });

            // ---------------------------------------------------------
            // COLUMN MAPPING FOR SURVEY AREAS
            // ---------------------------------------------------------
            const cArea1 = findColumn(sheetData[0], ['overall', 'average service', 'total']);
            const cArea2 = findColumn(sheetData[0], ['cleanliness', 'cleaning']);
            const cArea3 = findColumn(sheetData[0], ['security', 'guard']);
            const cArea4 = findColumn(sheetData[0], ['maintenance', 'repair', 'civil']);
            const cArea5 = findColumn(sheetData[0], ['food', 'quality', 'cafeteria', 'mess']);
            const cArea6 = findColumn(sheetData[0], ['transport', 'vehicle']);
            const cArea7 = findColumn(sheetData[0], ['behavior', 'attitude', 'staff']);
            const cArea8 = findColumn(sheetData[0], ['time', 'timeliness', 'punctuality']);

            let groupByCol = 'ExtractedMonth'; 
            let groupedStats = {};

            // Global Sums & Counts for top cards
            let gSum = [0,0,0,0,0,0,0,0], gCnt = [0,0,0,0,0,0,0,0];

            filteredData.forEach(item => {
                let label = item[groupByCol] || "Unknown";
                
                let vals = [
                    cleanNumber(item[cArea1]), cleanNumber(item[cArea2]),
                    cleanNumber(item[cArea3]), cleanNumber(item[cArea4]),
                    cleanNumber(item[cArea5]), cleanNumber(item[cArea6]),
                    cleanNumber(item[cArea7]), cleanNumber(item[cArea8])
                ];

                for(let i=0; i<8; i++) {
                    if(vals[i] > 0) { gSum[i] += vals[i]; gCnt[i]++; }
                }

                if (!groupedStats[label]) {
                    groupedStats[label] = { sums: [0,0,0,0,0,0,0,0], cnts: [0,0,0,0,0,0,0,0] };
                }

                for(let i=0; i<8; i++) {
                    if(vals[i] > 0) {
                        groupedStats[label].sums[i] += vals[i];
                        groupedStats[label].cnts[i]++;
                    }
                }
            });

            // Update Top Accumulated Values (Averages)
            for(let i=0; i<8; i++) {
                let valId = 'valArea' + (i+1);
                document.getElementById(valId).innerText = gCnt[i] > 0 ? formatAvg(gSum[i]/gCnt[i]) : "0%";
            }

            // Month-wise sorting
            let labels = Object.keys(groupedStats);
            const monthOrder = { "jan":1, "feb":2, "mar":3, "apr":4, "may":5, "jun":6, "jul":7, "aug":8, "sep":9, "oct":10, "nov":11, "dec":12 };
            labels.sort((a, b) => (monthOrder[a.toLowerCase().substring(0,3)] || 99) - (monthOrder[b.toLowerCase().substring(0,3)] || 99));

            let datasets = [[],[],[],[],[],[],[],[]];

            labels.forEach(lbl => {
                let s = groupedStats[lbl];
                for(let i=0; i<8; i++) {
                    datasets[i].push(s.cnts[i] > 0 ? (s.sums[i] / s.cnts[i]).toFixed(1) : 0);
                }
            });

            function updateC(chartInst, lbs, dta) {
                chartInst.data.labels = lbs;
                chartInst.data.datasets[0].data = dta;
                chartInst.update();
            }

            updateC(charts.area1, labels, datasets[0]);
            updateC(charts.area2, labels, datasets[1]);
            updateC(charts.area3, labels, datasets[2]);
            updateC(charts.area4, labels, datasets[3]);
            updateC(charts.area5, labels, datasets[4]);
            updateC(charts.area6, labels, datasets[5]);
            updateC(charts.area7, labels, datasets[6]);
            updateC(charts.area8, labels, datasets[7]);
        }

        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', updateDashboard);
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', () => {
            document.querySelectorAll('select').forEach(select => select.value = 'All');
            updateDashboard(); 
        });

        window.onload = () => {
            initCharts();
            fetchGoogleSheetData();
        };
    </script>
</body>
</html>
