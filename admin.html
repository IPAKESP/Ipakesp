<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Google Material Design Variables */
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            
            --bg-blue-light: rgba(66, 133, 244, 0.1);
            --bg-red-light: rgba(234, 67, 53, 0.1);
            --bg-yellow-light: rgba(251, 188, 5, 0.1);
            --bg-green-light: rgba(52, 168, 83, 0.1);

            --bg-light: #F8F9FA;
            --surface: #FFFFFF;
            --text-main: #202124;
            --text-muted: #5F6368;
            --border-color: #DADCE0;
            --header-height: 80px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column; 
            background-color: var(--bg-light);
            color: var(--text-main);
            height: 100vh;
        }

        /* ---------------------------------
           FULL-WIDTH TOP HEADER
        --------------------------------- */
        .top-header {
            width: 100%;
            height: var(--header-height);
            background-color: var(--surface);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            z-index: 200;
            position: fixed;
            top: 0;
            left: 0;
            box-sizing: border-box;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 50px; 
            width: auto;
            object-fit: contain;
            margin-right: 20px;
        }

        .top-header h1 {
            color: var(--google-blue);
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ---------------------------------
           LAYOUT WRAPPER
        --------------------------------- */
        .layout-container {
            display: flex;
            margin-top: var(--header-height); 
            height: calc(100vh - var(--header-height));
        }

        /* Clean Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--surface);
            border-right: 1px solid var(--border-color);
            padding: 25px 20px;
            overflow-y: auto;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h2 {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #F1F3F4;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group select:focus {
            background: var(--surface);
            border-color: var(--google-blue);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: transparent;
            color: var(--google-blue);
            border: 1px solid var(--google-blue);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
        }

        .clear-btn:hover {
            background-color: rgba(66, 133, 244, 0.08);
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 30px 40px;
            overflow-y: auto;
            box-sizing: border-box;
            position: relative;
        }

        /* ---------------------------------
           NAVIGATION TABS
        --------------------------------- */
        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-tabs a {
            text-decoration: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-tabs a:hover {
            color: var(--text-main);
            background-color: var(--bg-light);
            border-color: #c0c4c9;
        }

        .nav-tabs a.active {
            background-color: var(--google-green);
            color: white;
            border-color: var(--google-green);
            box-shadow: 0 2px 6px rgba(52, 168, 83, 0.3);
        }

        .nav-tabs a.home-icon {
            margin-left: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
            background-color: white;
        }

        .nav-tabs a.home-icon:hover {
            background-color: var(--bg-light);
        }

        .nav-tabs a.home-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Unified Card & Graph Widget Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-widget {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1), 0 1px 2px rgba(60,64,67,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 4px solid var(--border-color);
            padding: 18px 20px 10px 20px;
        }

        /* Cyclic Google Colors matching the Charts exactly */
        .kpi-widget:nth-child(4n+1) { border-top-color: var(--google-blue); }
        .kpi-widget:nth-child(4n+2) { border-top-color: var(--google-red); }
        .kpi-widget:nth-child(4n+3) { border-top-color: var(--google-yellow); }
        .kpi-widget:nth-child(4n+4) { border-top-color: var(--google-green); }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .kpi-title h3 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .chart-wrapper {
            position: relative;
            height: 140px; 
            width: 100%;
        }

        #loadingMsg {
            position: absolute;
            color: var(--google-blue);
            font-weight: 500;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <img src="Logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <h1>Corporate Dashboard</h1>
        </div>
    </header>
