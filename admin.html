<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Corporate Dashboard - Admin</title>
    <link rel="icon" href="Logo.png" type="image/png">
    
    <!-- Libraries for Chart & Image Generation -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ---------------------------------
           PREMIUM THEME VARIABLES (STANDARD)
        --------------------------------- */
        :root {
            --color-blue: #3B82F6;
            --color-red: #EF4444;
            --color-yellow: #F59E0B;
            --color-green: #10B981;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        /* LIGHT MODE */
        [data-theme="light"] {
            --bg-main: #F8FAFC;
            --bg-surface: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --border-color: #E2E8F0;
            --border-hover: #CBD5E1;
            --grid-line: #F1F5F9;
            --shadow-card: 0 4px 20px -2px rgba(15, 23, 42, 0.05);
            --bg-input: #F1F5F9;
            --btn-dim: rgba(15, 23, 42, 0.05);
            --doughnut-bg: #F1F5F9;
        }

        /* DARK MODE */
        [data-theme="dark"] {
            --bg-main: #09090B;
            --bg-surface: #121212;
            --text-primary: #FAFAFA;
            --text-secondary: #A1A1AA;
            --border-color: #27272A;
            --border-hover: #3F3F46;
            --grid-line: #18181B;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
            --bg-input: #18181B;
            --btn-dim: rgba(250, 250, 250, 0.1);
            --doughnut-bg: #27272A;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background-color: var(--bg-main); color: var(--text-primary);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            transition: var(--transition);
        }

        /* ---------------------------------
           HEADER & NAVIGATION
        --------------------------------- */
        .top-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 30px; background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color); height: 60px;
            box-sizing: border-box; transition: var(--transition);
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-brand a { display: flex; align-items: center; text-decoration: none; color: inherit; gap: 12px; }
        .header-brand h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.3px; }

        .nav-tabs { display: flex; gap: 8px; align-items: center; }
        .nav-tabs a {
            text-decoration: none; padding: 8px 16px; font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary); border-radius: 20px; transition: var(--transition);
        }
        .nav-tabs a.active { background-color: var(--text-primary); color: var(--bg-surface); }
        .nav-tabs a:hover:not(.active) { color: var(--text-primary); background-color: var(--bg-input); }
        
        .nav-tabs a.home-icon { padding: 8px; display: flex; align-items: center; justify-content: center; }
        .nav-tabs a.home-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        .theme-toggle {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 6px; margin-left: 15px;
        }
        .theme-toggle:hover { border-color: var(--text-secondary); }

        /* ---------------------------------
           SLEEK FILTER BAR
        --------------------------------- */
        .filter-bar {
            display: flex; align-items: center; gap: 15px; padding: 10px 30px;
            background-color: var(--bg-main); height: 50px; box-sizing: border-box;
            border-bottom: 1px solid var(--border-color); flex-wrap: nowrap; overflow-x: auto;
        }

        .filter-group { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .filter-group label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group select, .filter-group input {
            padding: 6px 28px 6px 12px; border-radius: 20px; border: 1px solid var(--border-color);
            background-color: var(--bg-surface); color: var(--text-primary); font-size: 0.75rem; font-weight: 600;
            font-family: inherit; cursor: pointer; outline: none; appearance: none; transition: var(--transition);
        }
        .filter-group select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2371717A%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 10px top 50%; background-size: 8px auto;
        }
        .filter-group select:hover, .filter-group input:hover { border-color: var(--border-hover); }

        .clear-btn {
            background-color: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);
            padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; margin-left: auto; transition: var(--transition); font-family: inherit;
        }
        .clear-btn:hover { color: var(--text-primary); border-color: var(--text-primary); }

        .report-btn-small {
            background: var(--color-blue); color: #fff; border: none;
            padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
            white-space: nowrap; font-family: inherit;
        }
        .report-btn-small:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* ---------------------------------
           PREMIUM BENTO GRID
        --------------------------------- */
        .workspace {
            flex: 1; padding: 15px 30px; display: flex; flex-direction: column;
            height: calc(100vh - 110px); box-sizing: border-box; position: relative;
        }

        .dashboard-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 15px; flex-grow: 1; height: 100%; min-height: 0; display: none;
        }

        .kpi-widget {
            background: var(--bg-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
            padding: 12px 16px; display: flex; flex-direction: column; 
            border: 1px solid var(--border-color);
            transition: var(--transition); overflow: hidden; min-height: 0;
            position: relative;
        }
        
        .kpi-widget:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .kpi-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot.blue { background-color: var(--color-blue); box-shadow: 0 0 8px var(--color-blue); }

        .kpi-title h3 { margin: 0; font-size: 0.75rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .chart-wrapper { position: relative; flex-grow: 1; width: 100%; height: 100%; min-height: 0; display: flex; align-items: center; justify-content: center; }

        /* ---------------------------------
           HIDDEN CONTAINER FOR IMAGE GEN
        --------------------------------- */
        #imageReportContainer { position: fixed; top: -9999px; left: -9999px; z-index: -1000; }

        .fade-out { opacity: 0 !important; transform: scale(0.97) !important; }
        .dashboard-grid { transition: opacity 0.3s ease, transform 0.3s ease; opacity: 1; transform: scale(1); }

        #loadingMsg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--text-primary); font-weight: 700; background: var(--bg-surface);
            padding: 15px 30px; border-radius: 30px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card); z-index: 10; font-size: 0.9rem;
        }

        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body { background-color: #FFFFFF !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; overflow: visible; height: auto;}
            .top-header { border-bottom: 2px solid #E2E8F0; background: #FFFFFF !important; }
            .header-brand h1 { color: #0F172A !important; }
            .nav-tabs, .theme-toggle, .filter-bar, #loadingMsg { display: none !important; }
            .workspace { height: auto !important; overflow: visible !important; padding: 0 !important; }
            .dashboard-grid { grid-template-columns: repeat(4, 1fr) !important; grid-template-rows: auto !important; gap: 15px !important; display: grid !important; height: auto !important;}
            .kpi-widget { border: 1px solid #E2E8F0 !important; box-shadow: none !important; background: #FFFFFF !important; break-inside: avoid; border-radius: 16px !important; transform: none !important; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="header-brand">
            <a href="index.html">
                <img src="Logo.png" alt="Logo" style="height: 35px; width: auto; object-fit: contain;">
                <h1>HR Corporate Dashboard</h1>
            </a>
        </div>
        <div style="display:flex; align-items:center;">
            <div class="nav-tabs">
                <a href="index.html">HR OPS</a>
                <a href="#" class="active">Admin</a>
                <a href="cost.html">Cost Center</a>
                <a href="transport.html">Transport</a> 
                <a href="index.html" class="home-icon" title="Home">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </a>
            </div>
            
            <button class="theme-toggle" id="themeToggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark
            </button>
        </div>
    </header>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Location</label>
            <select id="filterLocation" onchange="triggerUpdate()"><option value="All">Loading...</option></select>
        </div>
        
        <div class="filter-group">
            <label>Year</label>
            <select id="filterYear" onchange="clearDateAndTrigger()"></select>
        </div>

        <div class="filter-group">
            <label>Month</label>
            <select id="filterMonth" onchange="clearDateAndTrigger()">
                <option value="All">All Months (Trend)</option>
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Exact Date</label>
            <input type="date" id="filterDate" onchange="dateChangedAndTrigger()" title="Selecting a date will override Month/Year">
        </div>

        <button id="clearFiltersBtn" class="clear-btn">Reset View</button>
        
        <button class="report-btn-small" id="generateImageBtn" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Export
        </button>
    </div>

    <div class="workspace">
        <div id="loadingMsg">Syncing Live SLA Data...</div>

        <div class="dashboard-grid" id="dashboardContent">
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Plant Outside</h3></div></div><div class="chart-wrapper"><canvas id="chart-plantOutside"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>GH Building</h3></div></div><div class="chart-wrapper"><canvas id="chart-gh"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Executive Mess</h3></div></div><div class="chart-wrapper"><canvas id="chart-exec"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Technical Office</h3></div></div><div class="chart-wrapper"><canvas id="chart-tech"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Admin Building</h3></div></div><div class="chart-wrapper"><canvas id="chart-admin"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Social Block</h3></div></div><div class="chart-wrapper"><canvas id="chart-social"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>Staff Mess</h3></div></div><div class="chart-wrapper"><canvas id="chart-staffmess"></canvas></div></div>
            <div class="kpi-widget"><div class="kpi-header"><span class="dot blue"></span><div class="kpi-title"><h3>GH Rooms</h3></div></div><div class="chart-wrapper"><canvas id="chart-ghrooms"></canvas></div></div>
        </div>
    </div>

    <div id="imageReportContainer"></div>

    <script>
        // --- HEADER THEME LOGIC ---
        const themeBtn = document.getElementById('themeToggle');
        
        function updateChartThemeColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const gridColor = isDark ? '#18181B' : '#F1F5F9';
            const textColor = isDark ? '#FAFAFA' : '#0F172A';
            const doughnutBg = isDark ? '#27272A' : '#F1F5F9';

            Chart.defaults.color = isDark ? '#A1A1AA' : '#64748B';

            Object.values(myCharts).forEach(chart => {
                if(chart.options.scales && chart.options.scales.x) {
                    chart.options.scales.x.grid.color = gridColor;
                    chart.options.scales.y.grid.color = gridColor;
                    chart.options.scales.y.ticks.color = textColor;
                    chart.options.scales.x.ticks.color = textColor;
                }
                
                if(chart.config.type === 'doughnut') {
                    chart.data.datasets[0].backgroundColor[1] = doughnutBg;
                }
                
                chart.update();
            });
        }

        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const isCurrentlyDark = html.getAttribute('data-theme') === 'dark';
            const newTheme = isCurrentlyDark ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            
            themeBtn.innerHTML = newTheme === 'dark' 
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Light`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg> Dark`;
            
            updateChartThemeColors();
        });

        // Set Default Font for Charts
        Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";
        let myCharts = {}; 

        // Center Text Plugin for Doughnut Charts
        const centerTextPlugin = {
            id: 'centerTextPlugin',
            beforeDraw: function(chart) {
                if (chart.config.type !== 'doughnut') return;
                var width = chart.width, height = chart.height, ctx = chart.ctx;
                ctx.restore();
                
                let textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
                let fontSize = (height / 100).toFixed(2);
                ctx.font = "bold " + fontSize + "em 'Plus Jakarta Sans'";
                ctx.textBaseline = "middle";
                ctx.fillStyle = textColor;
                
                let text = chart.config.options.elements.center.text;
                let textX = Math.round((width - ctx.measureText(text).width) / 2);
                let textY = height / 2;
                
                ctx.fillText(text, textX, textY);
                ctx.save();
            }
        };
        Chart.register(centerTextPlugin);

        function clearDateAndTrigger() {
            document.getElementById('filterDate').value = ''; 
            triggerUpdate();
        }
        
        function dateChangedAndTrigger() {
            if(document.getElementById('filterDate').value !== '') {
                document.getElementById('filterMonth').value = 'All';
            }
            triggerUpdate();
        }

        // --- DATA LOGIC ---
        const urlIPAK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD6fL-gX0q_NiyLbcfvLYYEO1xal3B0CjtiRX9iAvEb_rC1Oxd1vbzhj5HIXMsxtrkcaUzcniQa_Kg/pub?single=true&output=csv&gid=";
        const urlPETPAK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwxU6lDnqY-uzfrqmJvOUUg8Wrv77iK1M5Z_IbXdvy0Vb45tl-Y9gB_ZrCEl4NFD0cZVMXg7MSkZGb/pub?single=true&output=csv&gid=";

        const endpoints = [
            { id: 'plantOutside', name: "Plant Outside", urls: [urlIPAK + '2010458815', urlPETPAK + '1331945712'], data: [] },
            { id: 'gh', name: "GH Building", urls: [urlIPAK + '1390887619'], data: [] },
            { id: 'exec', name: "Executive Mess", urls: [urlIPAK + '555464818'], data: [] },
            { id: 'tech', name: "Technical Office", urls: [urlIPAK + '764910885', urlPETPAK + '1871845517'], data: [] },
            { id: 'admin', name: "Admin Building", urls: [urlIPAK + '1399379514', urlPETPAK + '694716831'], data: [] },
            { id: 'social', name: "Social Block", urls: [urlIPAK + '435529281'], data: [] },
            { id: 'staffmess', name: "Staff Mess", urls: [urlIPAK + '995502820', urlPETPAK + '1859922210'], data: [] },
            { id: 'ghrooms', name: "GH Rooms", urls: [urlIPAK + '1231003265', urlPETPAK + '1060301945'], data: [] }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            fetchAllData(); 
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', () => {
            document.getElementById('filterLocation').value = 'All';
            const today = new Date();
            document.getElementById('filterYear').value = String(today.getFullYear());
            document.getElementById('filterMonth').value = 'All';
            document.getElementById('filterDate').value = '';
            triggerUpdate();
        });

        async function fetchAllData() {
            const syncStatus = document.getElementById('loadingMsg');
            
            try {
                await Promise.all(endpoints.map(async (ep) => {
                    await Promise.all(ep.urls.map(async (url) => {
                        try {
                            const res = await fetch(url);
                            const csvText = await res.text();
                            const parsed = parseCSVData(csvText);
                            ep.data = ep.data.concat(parsed);
                        } catch (e) {
                            console.error(`Failed to fetch ${url}:`, e);
                        }
                    }));
                }));
                
                populateDropdowns();
                
                const todayYear = String(new Date().getFullYear());
                const yearSelect = document.getElementById('filterYear');
                if (Array.from(yearSelect.options).some(opt => opt.value === todayYear)) {
                    yearSelect.value = todayYear;
                }
                
                updateDashboard();
                
                syncStatus.style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'grid';
                document.getElementById('generateImageBtn').style.display = 'inline-flex'; 
                
            } catch (error) {
                console.error("Master Fetch Error:", error);
                syncStatus.innerText = "Error Loading Data.";
            }
        }

        function parseCSVData(csvText) {
            const rows = csvText.split('\n');
            let parsedData = [];
            if (rows.length < 2) return parsedData;

            const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/"/g, '').trim().toLowerCase());
            let locIndex = headers.findIndex(h => h === 'location' || h === 'company' || h === 'plant' || h === 'site');
            if (locIndex === -1) locIndex = headers.findIndex(h => h.includes('location') || h.includes('company'));

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row.trim()) continue;

                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let rowDateStr = cols[0] ? cols[0].replace(/"/g, '').trim() : ''; 
                
                let parsedDate = ""; let parsedMonth = ""; let parsedYear = "";

                if (rowDateStr) {
                    let d = new Date(rowDateStr);
                    if (!isNaN(d.getTime())) {
                        let y = d.getFullYear();
                        let m = String(d.getMonth() + 1).padStart(2, '0');
                        let day = String(d.getDate()).padStart(2, '0');
                        parsedDate = `${y}-${m}-${day}`;
                        parsedMonth = `${y}-${m}`; 
                        parsedYear = String(y);
                    }
                }

                let rowLocation = "Unknown";
                if (locIndex !== -1 && cols[locIndex]) rowLocation = cols[locIndex].replace(/"/g, '').trim();

                let rowTotal = 0; let rowYes = 0;
                for (let j = 1; j < cols.length; j++) {
                    if (j === locIndex) continue; 
                    let cellValue = cols[j] ? cols[j].replace(/"/g, '').trim().toLowerCase() : '';
                    if (cellValue === "yes") { rowTotal++; rowYes++; } 
                    else if (cellValue === "no" || cellValue === "n/a") { rowTotal++; }
                }
                
                if (parsedYear) {
                    parsedData.push({ fullDate: parsedDate, month: parsedMonth, year: parsedYear, location: rowLocation, totalQuestions: rowTotal, achievedYes: rowYes });
                }
            }
            return parsedData;
        }

        function populateDropdowns() {
            let allLocations = new Set();
            let allYears = new Set();

            endpoints.forEach(ep => {
                ep.data.forEach(row => {
                    let loc = row.location ? row.location.trim() : "";
                    if (loc && loc.toLowerCase() !== 'unknown' && !loc.toLowerCase().includes("http") && loc.length < 30) {
                        allLocations.add(loc);
                    }
                    if (row.year) allYears.add(row.year);
                });
            });

            const locSelect = document.getElementById('filterLocation');
            locSelect.innerHTML = '<option value="All">All Locations</option>'; 
            Array.from(allLocations).sort().forEach((loc) => {
                const opt = document.createElement('option');
                opt.value = loc; opt.textContent = loc;
                locSelect.appendChild(opt);
            });

            const yearSelect = document.getElementById('filterYear');
            yearSelect.innerHTML = ''; 
            Array.from(allYears).sort((a,b) => b-a).forEach((yr) => {
                const opt = document.createElement('option');
                opt.value = yr; opt.textContent = yr;
                yearSelect.appendChild(opt);
            });
            
            if(yearSelect.options.length === 0) {
                const opt = document.createElement('option');
                opt.value = new Date().getFullYear();
                opt.textContent = new Date().getFullYear();
                yearSelect.appendChild(opt);
            }
        }

        function triggerUpdate() {
            const grid = document.getElementById('dashboardContent');
            grid.classList.add('fade-out');
            setTimeout(() => {
                updateDashboard();
                grid.classList.remove('fade-out');
            }, 300);
        }

        // --- CORE RENDER LOGIC ---
        function updateDashboard() {
            endpoints.forEach(ep => {
                renderCardLogic(ep.data, ep.id);
            });
        }

        function renderCardLogic(dataArray, prefix) {
            const loc = document.getElementById('filterLocation').value;
            const year = document.getElementById('filterYear').value;
            const month = document.getElementById('filterMonth').value; 
            const exactDate = document.getElementById('filterDate').value;

            let filteredRecords = dataArray;

            if (loc && loc !== 'All') {
                filteredRecords = filteredRecords.filter(item => item.location === loc);
            }

            const canvasId = `chart-${prefix}`;
            const ctx = document.getElementById(canvasId).getContext('2d');
            if(myCharts[prefix]) myCharts[prefix].destroy();

            const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--grid-line').trim();
            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
            const doughnutBg = getComputedStyle(document.documentElement).getPropertyValue('--doughnut-bg').trim();

            let showDoughnut = false;

            if (exactDate) {
                showDoughnut = true;
                filteredRecords = filteredRecords.filter(item => item.fullDate === exactDate);
            } else if (month !== 'All') {
                showDoughnut = true;
                let targetMonthFormat = `${year}-${month}`;
                filteredRecords = filteredRecords.filter(item => item.month === targetMonthFormat);
            } else {
                filteredRecords = filteredRecords.filter(item => item.year === year);
            }

            if (!showDoughnut) {
                // --- YEARLY TREND (BAR CHART) ---
                let monthlyStats = {};
                filteredRecords.forEach(item => {
                    if(!item.month) return;
                    if(!monthlyStats[item.month]) monthlyStats[item.month] = { total: 0, yes: 0 };
                    monthlyStats[item.month].total += item.totalQuestions;
                    monthlyStats[item.month].yes += item.achievedYes;
                });

                let labels = []; let dataPct = []; let bgColors = [];
                const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

                for (let i = 1; i <= 12; i++) {
                    let mStr = String(i).padStart(2, '0');
                    let targetKey = `${year}-${mStr}`;
                    labels.push(monthNames[i-1]);

                    if (monthlyStats[targetKey]) {
                        let stat = monthlyStats[targetKey];
                        let pct = stat.total > 0 ? (stat.yes / stat.total) * 100 : 0;
                        dataPct.push(pct);
                        bgColors.push(pct >= 95 ? '#10B981' : '#EF4444');
                    } else {
                        dataPct.push(0);
                        bgColors.push(getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim()); 
                    }
                }

                myCharts[prefix] = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{ data: dataPct, backgroundColor: bgColors, borderRadius: 4, barPercentage: 0.8 }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        animation: { duration: 800, easing: 'easeOutBounce' },
                        scales: {
                            y: { max: 100, min: 0, grid: { color: gridColor, drawBorder: false }, ticks: { color: textColor, font: {size: 10} } },
                            x: { grid: { display: false }, ticks: { color: textColor, font: {weight: 'bold', size: 9} } }
                        },
                        plugins: { legend: { display: false }, tooltip: { enabled: true, callbacks: { label: (c) => c.parsed.y.toFixed(1) + "%" } } }
                    }
                });

            } else {
                // --- SPECIFIC DATE/MONTH (DOUGHNUT CHART) ---
                let overallTotal = 0; let overallYes = 0;
                filteredRecords.forEach(item => { overallTotal += item.totalQuestions; overallYes += item.achievedYes; });

                let pct = overallTotal > 0 ? (overallYes / overallTotal) * 100 : 0;
                let displayPct = overallTotal > 0 ? pct.toFixed(0) + '%' : '0%';
                
                let color = pct >= 95 ? '#10B981' : '#EF4444';
                if(overallTotal === 0) color = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim(); 

                myCharts[prefix] = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Achieved', 'Remaining'],
                        datasets: [{ data: [pct, Math.max(0, 100 - pct)], backgroundColor: [color, doughnutBg], borderWidth: 0, cutout: '75%' }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        animation: { animateScale: true, animateRotate: true, duration: 800, easing: 'easeOutQuart' },
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        layout: { padding: 10 },
                        elements: { center: { text: displayPct } } 
                    }
                });
            }
        }

        // --- IMAGE REPORT LOGIC ---
        document.getElementById('generateImageBtn').addEventListener('click', async () => {
            const btn = document.getElementById('generateImageBtn');
            btn.innerHTML = 'Generating...';

            const allLocations = Array.from(document.getElementById('filterLocation').options).map(opt => opt.value).filter(val => val !== 'All');
            const year = document.getElementById('filterYear').value;
            const month = document.getElementById('filterMonth').value;
            const exactDate = document.getElementById('filterDate').value;
            
            let timeframeStr = `Year Trend: ${year}`;
            if (exactDate) timeframeStr = `Exact Date: ${exactDate}`;
            else if (month !== 'All') {
                const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                timeframeStr = `${monthNames[parseInt(month)-1]} ${year}`;
            }

            const reportContainer = document.getElementById('imageReportContainer');
            
            let htmlContent = `
                <div style="background: #ffffff; padding: 50px; width: 1400px; font-family: 'Plus Jakarta Sans', sans-serif;">
                    <div style="text-align: center; margin-bottom: 40px; border-bottom: 3px solid #E2E8F0; padding-bottom: 25px;">
                        <h1 style="margin: 0; color: #0F172A; font-size: 38px; font-weight: 800; text-transform: uppercase;">IPAK SLA Report</h1>
                        <p style="margin: 15px 0 0 0; color: #64748B; font-size: 20px; font-weight: 600;">Timeframe Selection: <span style="color: #3B82F6;">${timeframeStr}</span></p>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
            `;

            allLocations.forEach(loc => {
                htmlContent += `
                    <div style="background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
                        <h2 style="margin: 0 0 20px 0; color: #0F172A; font-size: 24px; text-align: center; border-bottom: 2px solid #CBD5E1; padding-bottom: 15px; text-transform: uppercase;">${loc}</h2>
                        <table style="width: 100%; border-collapse: collapse; font-size: 18px;">
                            <tbody>
                `;
                
                endpoints.forEach(ep => {
                    let fData = ep.data.filter(item => item.location === loc);
                    
                    if (exactDate) fData = fData.filter(i => i.fullDate === exactDate);
                    else if (month !== 'All') {
                        let targetMonthFormat = `${year}-${month}`;
                        fData = fData.filter(i => i.month === targetMonthFormat);
                    } else {
                        fData = fData.filter(i => i.year === year);
                    }

                    let total = 0; let yes = 0;
                    fData.forEach(item => { total += item.totalQuestions; yes += item.achievedYes; });

                    if (total > 0) {
                        let pct = (yes / total) * 100;
                        let color = pct >= 95 ? '#10B981' : '#EF4444';
                        
                        htmlContent += `
                            <tr>
                                <td style="padding: 12px 0; color: #64748B; font-weight: 600; border-bottom: 1px solid #F1F5F9;">${ep.name}</td>
                                <td style="padding: 12px 0; text-align: right; color: ${color}; font-weight: 800; font-size: 20px; border-bottom: 1px solid #F1F5F9;">${pct.toFixed(0)}%</td>
                            </tr>
                        `;
                    } else {
                        htmlContent += `
                            <tr>
                                <td style="padding: 12px 0; color: #64748B; font-weight: 600; border-bottom: 1px solid #F1F5F9;">${ep.name}</td>
                                <td style="padding: 12px 0; text-align: right; color: #94A3B8; font-weight: 800; font-size: 20px; border-bottom: 1px solid #F1F5F9;">N/A</td>
                            </tr>
                        `;
                    }
                });

                htmlContent += `</tbody></table></div>`;
            });

            htmlContent += `
                    </div>
                    <div style="margin-top: 40px; text-align: center; color: #94A3B8; font-size: 16px; font-weight: 500;">
                        Generated automatically by HR Corporate Dashboard System on ${new Date().toLocaleString()}
                    </div>
                </div>
            `;

            reportContainer.innerHTML = htmlContent;

            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(reportContainer.firstElementChild, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
                    const imgData = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = imgData;
                    link.download = `SLA_Report_${timeframeStr.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    alert("Error generating the image report.");
                } finally {
                    reportContainer.innerHTML = ''; 
                    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Export`;
                }
            }, 500);
        });

    </script>
</body>
