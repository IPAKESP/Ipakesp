<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Google Material Design Variables */
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --bg-light: #F8F9FA;
            --surface: #FFFFFF;
            --text-main: #202124;
            --text-muted: #5F6368;
            --border-color: #DADCE0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* Clean Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--surface);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            padding: 25px 20px;
            position: fixed;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar h2 {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #F1F3F4;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group select:focus {
            background: var(--surface);
            border-color: var(--google-blue);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        /* Clear Filters Button */
        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: transparent;
            color: var(--google-blue);
            border: 1px solid var(--google-blue);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
        }

        .clear-btn:hover {
            background-color: rgba(66, 133, 244, 0.08);
        }

        /* Main Content Area */
        .main-content {
            margin-left: 300px;
            padding: 30px 40px;
            width: calc(100% - 340px);
        }

        header h1 {
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: 400;
        }

        /* Minimal & Smaller Stats Cards */
        .stats-container {
            display: flex;
            gap: 15px; /* Reduced gap */
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .card {
            background: var(--surface);
            padding: 12px 15px; /* Reduced padding for smaller size */
            border-radius: 10px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1), 0 1px 2px rgba(60,64,67,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 160px; /* Reduced minimum width */
            flex: 1;
            border-top: 3px solid var(--border-color); /* Thinner top border */
        }

        /* 4 Google Colors for 4 Cards */
        .card:nth-child(1) { border-top-color: var(--google-blue); }
        .card:nth-child(2) { border-top-color: var(--google-red); }
        .card:nth-child(3) { border-top-color: var(--google-yellow); }
        .card:nth-child(4) { border-top-color: var(--google-green); }

        .card h3 {
            margin: 0 0 5px 0; /* Reduced bottom margin */
            font-size: 0.75rem; /* Smaller heading font */
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .card .value {
            font-size: 1.4rem; /* Smaller numbers */
            font-weight: 500; /* Adjusted weight to match smaller size */
            color: var(--text-main);
            margin: 0;
        }

        /* Compact Charts Grid (2x2 Layout) */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: var(--surface);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1), 0 1px 2px rgba(60,64,67,0.06);
            height: 280px; 
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .chart-card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 0.9rem; 
            color: var(--text-main);
            font-weight: 500;
        }

        .canvas-wrapper {
            position: relative;
            flex-grow: 1;
            width: 100%;
        }

        #loadingMsg {
            position: absolute;
            color: var(--google-blue);
            font-weight: 500;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Filters</h2>
        <div class="filter-group">
            <label>Year</label>
            <select id="filterYear"><option value="All">All Years</option></select>
        </div>
        <div class="filter-group">
            <label>Month</label>
            <select id="filterMonth"><option value="All">All Months</option></select>
        </div>
        <div class="filter-group">
            <label>Department</label>
            <select id="filterDept"><option value="All">All Departments</option></select>
        </div>
        <div class="filter-group">
            <label>Section</label>
            <select id="filterSection"><option value="All">All Sections</option></select>
        </div>
        <button id="clearFiltersBtn" class="clear-btn">Clear Filters</button>
    </div>

    <div class="main-content">
        <header>
            <h1>Corporate Overview</h1>
        </header>

        <div id="loadingMsg">Fetching live data...</div>

        <div class="stats-container" id="dashboardContent" style="display: none;">
            <div class="card">
                <h3>Act vs Std Hrs %</h3>
                <div class="value" id="valActVsStdPercent">...</div>
            </div>
            <div class="card">
                <h3>Total OT Hours</h3>
                <div class="value" id="valOTHours">...</div>
            </div>
            <div class="card">
                <h3>Total OT Cost</h3>
                <div class="value" id="valOTCost">...</div>
            </div>
            <div class="card">
                <h3>Average OT %</h3>
                <div class="value" id="valOTPercent">...</div>
            </div>
        </div>

        <div class="charts-grid" id="chartsContent" style="display: none;">
            <div class="chart-card">
                <h3>Act vs Std Hours %</h3>
                <div class="canvas-wrapper"><canvas id="chartActVsStd"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Overtime Hours</h3>
                <div class="canvas-wrapper"><canvas id="chartOTHours"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Overtime Cost</h3>
                <div class="canvas-wrapper"><canvas id="chartOTCost"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>Overtime % Trend</h3>
                <div class="canvas-wrapper"><canvas id="chartOTPercent"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPcR5zF9y3FOUxNN1b5aiJDRlCjm-8Di1QzcP4BhzefQaeHpClaGeE4_bKkkPA27LqTOje4MoOKEen/pub?gid=798992094&single=true&output=csv';

        let sheetData = [];
        let chartInstanceOTHours, chartInstanceOTCost, chartInstanceOTPercent, chartInstanceActVsStd;
        let headers = [];

        const G_BLUE = '#4285F4';
        const G_RED = '#EA4335';
        const G_YELLOW = '#FBBC05';
        const G_GREEN = '#34A853';

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                
                arr[row][col] += cc;
            }
            return arr;
        }

        function findColumn(row, keywords) {
            if(!row) return null;
            return Object.keys(row).find(key => keywords.some(kw => key.toLowerCase().includes(kw)));
        }

        function cleanNumber(val) {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function formatNum(num) {
            return num.toLocaleString('en-US', { maximumFractionDigits: 1 });
        }

        function initCharts() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 1000, easing: 'easeOutQuart' },
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#f1f3f4', drawBorder: false },
                        ticks: { color: '#5f6368', font: { family: 'Roboto', size: 10 } }
                    },
                    x: {
                        grid: { display: false, drawBorder: false },
                        ticks: { 
                            color: '#5f6368', font: { family: 'Roboto', size: 10 }, 
                            maxRotation: 45, minRotation: 0
                        }
                    }
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        titleFont: { family: 'Roboto', size: 11 }, 
                        bodyFont: { family: 'Roboto', size: 11 }   
                    }
                }
            };

            const ctx0 = document.getElementById('chartActVsStd').getContext('2d');
            chartInstanceActVsStd = new Chart(ctx0, {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: G_BLUE, borderRadius: 4, barPercentage: 0.6, data: [] }] },
                options: commonOptions
            });

            const ctx1 = document.getElementById('chartOTHours').getContext('2d');
            chartInstanceOTHours = new Chart(ctx1, {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: G_RED, borderRadius: 4, barPercentage: 0.6, data: [] }] },
                options: commonOptions
            });

            const ctx2 = document.getElementById('chartOTCost').getContext('2d');
            chartInstanceOTCost = new Chart(ctx2, {
                type: 'bar',
                data: { labels: [], datasets: [{ backgroundColor: G_YELLOW, borderRadius: 4, barPercentage: 0.6, data: [] }] },
                options: commonOptions
            });

            const ctx3 = document.getElementById('chartOTPercent').getContext('2d');
            chartInstanceOTPercent = new Chart(ctx3, {
                type: 'line', 
                data: { labels: [], datasets: [{ borderColor: G_GREEN, backgroundColor: 'rgba(52, 168, 83, 0.1)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 3, data: [] }] },
                options: commonOptions
            });
        }

        function populateDropdowns() {
            const yearCol = findColumn(sheetData[0], ['year', 'saal']);
            const monthCol = findColumn(sheetData[0], ['month', 'mahina']);
            const deptCol = findColumn(sheetData[0], ['department', 'dept']);
            const sectionCol = findColumn(sheetData[0], ['section', 'sec']);

            const years = new Set();
            const months = new Set();
            const depts = new Set();
            const sections = new Set();

            sheetData.forEach(row => {
                if (yearCol && row[yearCol]) years.add(row[yearCol]);
                if (monthCol && row[monthCol]) months.add(row[monthCol]);
                if (deptCol && row[deptCol]) depts.add(row[deptCol]);
                if (sectionCol && row[sectionCol]) sections.add(row[sectionCol]);
            });

            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                select.innerHTML = `<option value="All">All ${setId.replace('filter', '')}s</option>`;
                
                dataSet.forEach(val => {
                    let opt = document.createElement('option');
                    opt.value = val;
                    opt.innerHTML = val;
                    select.appendChild(opt);
                });
            };

            addOptions('filterYear', years);
            addOptions('filterMonth', months);
            addOptions('filterDept', depts);
            addOptions('filterSection', sections);
        }

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                headers = rows[0].map(h => h.trim());
                
                sheetData = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((cell, i) => {
                        obj[headers[i]] = cell ? cell.trim() : "";
                    });
                    return obj;
                });

                sheetData = sheetData.filter(row => Object.values(row).some(x => x !== ""));

                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'flex';
                document.getElementById('chartsContent').style.display = 'grid';

                populateDropdowns();
                updateDashboard(); 
            } catch (error) {
                console.error("Data uthane mein masla:", error);
                document.getElementById('loadingMsg').innerText = "Failed to load data. Check console.";
            }
        }

        function updateDashboard() {
            if(sheetData.length === 0) return;

            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedDept = document.getElementById('filterDept').value;
            const selectedSection = document.getElementById('filterSection').value;

            const companyCol = findColumn(sheetData[0], ['company', 'unit', 'plant', 'factory']);
            const yearCol = findColumn(sheetData[0], ['year']);
            const monthCol = findColumn(sheetData[0], ['month']);
            const deptCol = findColumn(sheetData[0], ['department', 'dept']);
            const sectionCol = findColumn(sheetData[0], ['section', 'sec']);

            let filteredData = sheetData.filter(item => {
                let match = true;
                if(selectedYear !== "All" && yearCol && item[yearCol] !== selectedYear) match = false;
                if(selectedMonth !== "All" && monthCol && item[monthCol] !== selectedMonth) match = false;
                if(selectedDept !== "All" && deptCol && item[deptCol] !== selectedDept) match = false;
                if(selectedSection !== "All" && sectionCol && item[sectionCol] !== selectedSection) match = false;
                return match;
            });

            const actVsStdCol = findColumn(sheetData[0], ['actual vs standard', 'actual vs std']);
            const otHoursCol = findColumn(sheetData[0], ['overtime hours', 'total ot hours']);
            const otCostCol = findColumn(sheetData[0], ['ot cost', 'overtime cost']);
            const otPercentCol = findColumn(sheetData[0], ['ot%', 'ot %', 'overtime %']);
            
            let groupByCol = companyCol || deptCol || headers[0]; 

            if (selectedDept !== "All" && sectionCol) {
                groupByCol = sectionCol;
            }
            
            if (selectedSection !== "All" && monthCol) {
                groupByCol = monthCol;
            }

            let groupedStats = {};
            let totalOT = 0, totalCost = 0;
            let totalOTPct = 0, countOTPct = 0;
            let totalActStdPct = 0, countActStdPct = 0;

            filteredData.forEach(item => {
                let label = item[groupByCol] || "Unknown";
                
                let actStdVal = cleanNumber(item[actVsStdCol]);
                let otVal = cleanNumber(item[otHoursCol]);
                let costVal = cleanNumber(item[otCostCol]);
                let otPctVal = cleanNumber(item[otPercentCol]);

                totalOT += otVal;
                totalCost += costVal;
                if (otPctVal > 0) { totalOTPct += otPctVal; countOTPct++; }
                if (actStdVal > 0) { totalActStdPct += actStdVal; countActStdPct++; }

                if (!groupedStats[label]) {
                    groupedStats[label] = { hours: 0, cost: 0, pctSum: 0, count: 0, actStdSum: 0, actStdCount: 0 };
                }
                groupedStats[label].hours += otVal;
                groupedStats[label].cost += costVal;
                
                if(otPctVal > 0) {
                    groupedStats[label].pctSum += otPctVal;
                    groupedStats[label].count += 1;
                }
                
                if(actStdVal > 0) {
                    groupedStats[label].actStdSum += actStdVal;
                    groupedStats[label].actStdCount += 1;
                }
            });

            let avgActStdPct = countActStdPct > 0 ? (totalActStdPct / countActStdPct).toFixed(2) : 0;
            document.getElementById('valActVsStdPercent').innerText = avgActStdPct + "%";
            document.getElementById('valOTHours').innerText = formatNum(totalOT);
            document.getElementById('valOTCost').innerText = "Rs " + formatNum(totalCost); 
            let avgOTPct = countOTPct > 0 ? (totalOTPct / countOTPct).toFixed(2) : 0;
            document.getElementById('valOTPercent').innerText = avgOTPct + "%";

            let chartLabels = Object.keys(groupedStats);
            let arrActStd = [];
            let arrHours = [];
            let arrCost = [];
            let arrPct = [];

            chartLabels.forEach(label => {
                arrHours.push(groupedStats[label].hours);
                arrCost.push(groupedStats[label].cost);
                
                let avgGrpActStd = groupedStats[label].actStdCount > 0 ? (groupedStats[label].actStdSum / groupedStats[label].actStdCount) : 0;
                arrActStd.push(avgGrpActStd);

                let avgGrpPct = groupedStats[label].count > 0 ? (groupedStats[label].pctSum / groupedStats[label].count) : 0;
                arrPct.push(avgGrpPct);
            });

            chartInstanceActVsStd.data.labels = chartLabels;
            chartInstanceActVsStd.data.datasets[0].data = arrActStd;
            chartInstanceActVsStd.update();

            chartInstanceOTHours.data.labels = chartLabels;
            chartInstanceOTHours.data.datasets[0].data = arrHours;
            chartInstanceOTHours.update();

            chartInstanceOTCost.data.labels = chartLabels;
            chartInstanceOTCost.data.datasets[0].data = arrCost;
            chartInstanceOTCost.update();

            chartInstanceOTPercent.data.labels = chartLabels;
            chartInstanceOTPercent.data.datasets[0].data = arrPct;
            chartInstanceOTPercent.update();
        }

        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', updateDashboard);
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', () => {
            document.querySelectorAll('select').forEach(select => select.value = 'All');
            updateDashboard(); 
        });

        window.onload = () => {
            initCharts();
            fetchGoogleSheetData();
        };
    </script>
</body>
</html>
