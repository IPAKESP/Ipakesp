<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Google Material Design Variables */
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            
            --bg-blue-light: rgba(66, 133, 244, 0.1);
            --bg-red-light: rgba(234, 67, 53, 0.1);
            --bg-yellow-light: rgba(251, 188, 5, 0.1);
            --bg-green-light: rgba(52, 168, 83, 0.1);

            --bg-light: #F8F9FA;
            --surface: #FFFFFF;
            --text-main: #202124;
            --text-muted: #5F6368;
            --border-color: #DADCE0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* Clean Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--surface);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            padding: 25px 20px;
            position: fixed;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar h2 {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #F1F3F4;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group select:focus {
            background: var(--surface);
            border-color: var(--google-blue);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .clear-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: transparent;
            color: var(--google-blue);
            border: 1px solid var(--google-blue);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
        }

        .clear-btn:hover {
            background-color: rgba(66, 133, 244, 0.08);
        }

        /* Main Content Area */
        .main-content {
            margin-left: 300px;
            padding: 30px 40px;
            width: calc(100% - 340px);
        }

        header h1 {
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.6rem;
            font-weight: 400;
        }

        /* Unified Card & Graph Widget Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-widget {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1), 0 1px 2px rgba(60,64,67,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 4px solid var(--border-color);
            padding: 20px;
        }

        /* Cyclic Google Colors */
        .kpi-widget:nth-child(4n+1) { border-top-color: var(--google-blue); }
        .kpi-widget:nth-child(4n+2) { border-top-color: var(--google-red); }
        .kpi-widget:nth-child(4n+3) { border-top-color: var(--google-yellow); }
        .kpi-widget:nth-child(4n+4) { border-top-color: var(--google-green); }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .kpi-title h3 {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .chart-wrapper {
            position: relative;
            height: 150px; /* Chart height directly inside card */
            width: 100%;
        }

        #loadingMsg {
            position: absolute;
            color: var(--google-blue);
            font-weight: 500;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Filters</h2>
        <div class="filter-group">
            <label>Year</label>
            <select id="filterYear"><option value="All">All Years</option></select>
        </div>
        <div class="filter-group">
            <label>Month</label>
            <select id="filterMonth"><option value="All">All Months</option></select>
        </div>
        <div class="filter-group">
            <label>Department</label>
            <select id="filterDept"><option value="All">All Departments</option></select>
        </div>
        <div class="filter-group">
            <label>Section</label>
            <select id="filterSection"><option value="All">All Sections</option></select>
        </div>
        <button id="clearFiltersBtn" class="clear-btn">Clear Filters</button>
    </div>

    <div class="main-content">
        <header>
            <h1>Corporate Overview</h1>
        </header>

        <div id="loadingMsg">Fetching live data...</div>

        <div class="dashboard-grid" id="dashboardContent" style="display: none;">
            
            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>TP Total OT Hours</h3>
                        <div class="kpi-value" id="valTPOTHours">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartTPOTHours"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>TP OT %</h3>
                        <div class="kpi-value" id="valTPOTPercent">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartTPOTPercent"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Absenteeism %</h3>
                        <div class="kpi-value" id="valAbsent">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartAbsent"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Leaves %</h3>
                        <div class="kpi-value" id="valLeave">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartLeave"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Late Arrival %</h3>
                        <div class="kpi-value" id="valLate">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartLate"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Early Out %</h3>
                        <div class="kpi-value" id="valEarly">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartEarly"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Active Employee %</h3>
                        <div class="kpi-value" id="valActive">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartActive"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Joiners</h3>
                        <div class="kpi-value" id="valJoiners">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartJoiners"></canvas></div>
            </div>

            <div class="kpi-widget">
                <div class="kpi-header">
                    <div class="kpi-title">
                        <h3>Leavers</h3>
                        <div class="kpi-value" id="valLeavers">...</div>
                    </div>
                </div>
                <div class="chart-wrapper"><canvas id="chartLeavers"></canvas></div>
            </div>

        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPcR5zF9y3FOUxNN1b5aiJDRlCjm-8Di1QzcP4BhzefQaeHpClaGeE4_bKkkPA27LqTOje4MoOKEen/pub?gid=798992094&single=true&output=csv';

        let sheetData = [];
        let headers = [];

        // Store Chart Instances
        const charts = {};

        // Colors
        const G_BLUE = '#4285F4';
        const G_RED = '#EA4335';
        const G_YELLOW = '#FBBC05';
        const G_GREEN = '#34A853';

        const BG_BLUE = 'rgba(66, 133, 244, 0.15)';
        const BG_RED = 'rgba(234, 67, 53, 0.15)';
        const BG_YELLOW = 'rgba(251, 188, 5, 0.15)';
        const BG_GREEN = 'rgba(52, 168, 83, 0.15)';

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                
                arr[row][col] += cc;
            }
            return arr;
        }

        function findColumn(row, keywords) {
            if(!row) return null;
            return Object.keys(row).find(key => keywords.some(kw => key.toLowerCase().includes(kw)));
        }

        function cleanNumber(val) {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            let cleaned = val.toString().replace(/,/g, '').replace(/%/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function formatNum(num) {
            return num.toLocaleString('en-US', { maximumFractionDigits: 1 });
        }

        // Helper function to create charts easily
        function createChart(canvasId, type, colorLine, colorBg) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: type,
                data: { 
                    labels: [], 
                    datasets: [{ 
                        backgroundColor: type === 'line' ? colorBg : colorLine, 
                        borderColor: colorLine,
                        borderWidth: 2,
                        fill: type === 'line', // Fill only for line graphs
                        tension: 0.4,
                        pointRadius: 2,
                        borderRadius: type === 'bar' ? 4 : 0,
                        data: [] 
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 800, easing: 'easeOutQuart' },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { titleFont: { size: 10 }, bodyFont: { size: 10 } }
                    },
                    scales: { 
                        y: { 
                            display: true, // Hide axis values for super clean look
                            beginAtZero: true, 
                            grid: { drawBorder: false, color: '#f1f3f4' },
                            ticks: { font: { size: 9 }, color: '#9aa0a6' }
                        },
                        x: { 
                            display: true, 
                            grid: { display: false },
                            ticks: { font: { size: 9 }, color: '#9aa0a6', maxRotation: 45, minRotation: 0 }
                        }
                    }
                }
            });
        }

        function initCharts() {
            // We use standard pattern: Bar for absolute numbers, Line for Percentages
            charts.tpotHours = createChart('chartTPOTHours', 'bar', G_BLUE, BG_BLUE);
            charts.tpotPct = createChart('chartTPOTPercent', 'line', G_RED, BG_RED);
            charts.absent = createChart('chartAbsent', 'line', G_YELLOW, BG_YELLOW);
            charts.leave = createChart('chartLeave', 'line', G_GREEN, BG_GREEN);
            charts.late = createChart('chartLate', 'line', G_BLUE, BG_BLUE);
            charts.early = createChart('chartEarly', 'line', G_RED, BG_RED);
            charts.active = createChart('chartActive', 'line', G_YELLOW, BG_YELLOW);
            charts.joiners = createChart('chartJoiners', 'bar', G_GREEN, BG_GREEN);
            charts.leavers = createChart('chartLeavers', 'bar', G_BLUE, BG_BLUE);
        }

        function updateSectionDropdown() {
            const selectedDept = document.getElementById('filterDept').value;
            const deptCol = findColumn(sheetData[0], ['department', 'dept']);
            const sectionCol = findColumn(sheetData[0], ['section', 'sec']);

            if (!sectionCol) return;

            const sections = new Set();
            sheetData.forEach(row => {
                if (selectedDept === "All" || row[deptCol] === selectedDept) {
                    if (row[sectionCol]) sections.add(row[sectionCol]);
                }
            });

            const sectionSelect = document.getElementById('filterSection');
            const currentSelection = sectionSelect.value;

            sectionSelect.innerHTML = `<option value="All">All Sections</option>`;
            
            sections.forEach(val => {
                let opt = document.createElement('option');
                opt.value = val;
                opt.innerHTML = val;
                sectionSelect.appendChild(opt);
            });

            if (sections.has(currentSelection)) {
                sectionSelect.value = currentSelection;
            } else {
                sectionSelect.value = "All";
            }
        }

        function populateDropdowns() {
            const yearCol = findColumn(sheetData[0], ['year', 'saal']);
            const monthCol = findColumn(sheetData[0], ['month', 'mahina']);
            const deptCol = findColumn(sheetData[0], ['department', 'dept']);

            const years = new Set();
            const months = new Set();
            const depts = new Set();

            sheetData.forEach(row => {
                if (yearCol && row[yearCol]) years.add(row[yearCol]);
                if (monthCol && row[monthCol]) months.add(row[monthCol]);
                if (deptCol && row[deptCol]) depts.add(row[deptCol]);
            });

            const addOptions = (setId, dataSet) => {
                const select = document.getElementById(setId);
                select.innerHTML = `<option value="All">All ${setId.replace('filter', '')}s</option>`;
                dataSet.forEach(val => {
                    let opt = document.createElement('option');
                    opt.value = val;
                    opt.innerHTML = val;
                    select.appendChild(opt);
                });
            };

            addOptions('filterYear', years);
            addOptions('filterMonth', months);
            addOptions('filterDept', depts);
            
            updateSectionDropdown();
        }

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                headers = rows[0].map(h => h.trim());
                
                sheetData = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((cell, i) => {
                        obj[headers[i]] = cell ? cell.trim() : "";
                    });
                    return obj;
                });

                sheetData = sheetData.filter(row => Object.values(row).some(x => x !== ""));

                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'grid'; 

                populateDropdowns();
                updateDashboard(); 
            } catch (error) {
                console.error("Data uthane mein masla:", error);
                document.getElementById('loadingMsg').innerText = "Failed to load data. Check console.";
            }
        }

        function updateDashboard() {
            if(sheetData.length === 0) return;

            const selectedYear = document.getElementById('filterYear').value;
            const selectedMonth = document.getElementById('filterMonth').value;
            const selectedDept = document.getElementById('filterDept').value;
            const selectedSection = document.getElementById('filterSection').value;

            // Dimensions
            const companyCol = findColumn(sheetData[0], ['company', 'unit', 'plant', 'factory']);
            const yearCol = findColumn(sheetData[0], ['year']);
            const monthCol = findColumn(sheetData[0], ['month']);
            const deptCol = findColumn(sheetData[0], ['department', 'dept']);
            const sectionCol = findColumn(sheetData[0], ['section', 'sec']);

            let filteredData = sheetData.filter(item => {
                let match = true;
                if(selectedYear !== "All" && yearCol && item[yearCol] !== selectedYear) match = false;
                if(selectedMonth !== "All" && monthCol && item[monthCol] !== selectedMonth) match = false;
                if(selectedDept !== "All" && deptCol && item[deptCol] !== selectedDept) match = false;
                if(selectedSection !== "All" && sectionCol && item[sectionCol] !== selectedSection) match = false;
                return match;
            });

            // KPI Columns Mapping
            const tpOTHoursCol = findColumn(sheetData[0], ['tp total ot hours', 'tp ot hour', 'tp ot hrs']);
            const tpOTPctCol = findColumn(sheetData[0], ['tp ot%', 'tp ot %']);
            const absentCol = findColumn(sheetData[0], ['absenteeism', 'absent']);
            const leaveCol = findColumn(sheetData[0], ['leaves', 'leave %']);
            const lateCol = findColumn(sheetData[0], ['late arrival', 'late']);
            const earlyCol = findColumn(sheetData[0], ['early out', 'early']);
            const activeEmpCol = findColumn(sheetData[0], ['active employee', 'active %']);
            const joinersCol = findColumn(sheetData[0], ['joiners', 'join']);
            const leaversCol = findColumn(sheetData[0], ['leavers', 'leave count']);

            // Drilldown Logic
            let groupByCol = companyCol || deptCol || headers[0]; 
            if (selectedDept !== "All" && sectionCol) groupByCol = sectionCol;
            if (selectedSection !== "All" && monthCol) groupByCol = monthCol;

            // Global Sums & Counts
            let gSumTP = 0, gJoin = 0, gLeave = 0;
            let pTP = 0, cTP = 0;
            let pAbs = 0, cAbs = 0;
            let pLev = 0, cLev = 0;
            let pLat = 0, cLat = 0;
            let pEar = 0, cEar = 0;
            let pAct = 0, cAct = 0;

            let groupedStats = {};

            filteredData.forEach(item => {
                let label = item[groupByCol] || "Unknown";

                let vTP = cleanNumber(item[tpOTHoursCol]);
                let vTPPct = cleanNumber(item[tpOTPctCol]);
                let vAbs = cleanNumber(item[absentCol]);
                let vLev = cleanNumber(item[leaveCol]);
                let vLat = cleanNumber(item[lateCol]);
                let vEar = cleanNumber(item[earlyCol]);
                let vAct = cleanNumber(item[activeEmpCol]);
                let vJoin = cleanNumber(item[joinersCol]);
                let vLeav = cleanNumber(item[leaversCol]);

                // Global additions
                gSumTP += vTP; gJoin += vJoin; gLeave += vLeav;
                if (vTPPct > 0) { pTP += vTPPct; cTP++; }
                if (vAbs > 0) { pAbs += vAbs; cAbs++; }
                if (vLev > 0) { pLev += vLev; cLev++; }
                if (vLat > 0) { pLat += vLat; cLat++; }
                if (vEar > 0) { pEar += vEar; cEar++; }
                if (vAct > 0) { pAct += vAct; cAct++; }

                // Grouping
                if (!groupedStats[label]) {
                    groupedStats[label] = {
                        tp:0, jn:0, lv:0,
                        tpP:0, tpC:0,
                        abP:0, abC:0,
                        leP:0, leC:0,
                        laP:0, laC:0,
                        eaP:0, eaC:0,
                        acP:0, acC:0
                    };
                }

                groupedStats[label].tp += vTP;
                groupedStats[label].jn += vJoin;
                groupedStats[label].lv += vLeav;

                if (vTPPct > 0) { groupedStats[label].tpP += vTPPct; groupedStats[label].tpC++; }
                if (vAbs > 0) { groupedStats[label].abP += vAbs; groupedStats[label].abC++; }
                if (vLev > 0) { groupedStats[label].leP += vLev; groupedStats[label].leC++; }
                if (vLat > 0) { groupedStats[label].laP += vLat; groupedStats[label].laC++; }
                if (vEar > 0) { groupedStats[label].eaP += vEar; groupedStats[label].eaC++; }
                if (vAct > 0) { groupedStats[label].acP += vAct; groupedStats[label].acC++; }
            });

            // Update Global Main Card Values
            document.getElementById('valTPOTHours').innerText = formatNum(gSumTP);
            document.getElementById('valJoiners').innerText = formatNum(gJoin);
            document.getElementById('valLeavers').innerText = formatNum(gLeave);

            document.getElementById('valTPOTPercent').innerText = cTP > 0 ? (pTP / cTP).toFixed(2) + "%" : "0%";
            document.getElementById('valAbsent').innerText = cAbs > 0 ? (pAbs / cAbs).toFixed(2) + "%" : "0%";
            document.getElementById('valLeave').innerText = cLev > 0 ? (pLev / cLev).toFixed(2) + "%" : "0%";
            document.getElementById('valLate').innerText = cLat > 0 ? (pLat / cLat).toFixed(2) + "%" : "0%";
            document.getElementById('valEarly').innerText = cEar > 0 ? (pEar / cEar).toFixed(2) + "%" : "0%";
            document.getElementById('valActive').innerText = cAct > 0 ? (pAct / cAct).toFixed(2) + "%" : "0%";

            // Prepare Data for 9 Charts
            let labels = Object.keys(groupedStats);
            let dTP = [], dTPPct = [], dAbs = [], dLev = [], dLat = [], dEar = [], dAct = [], dJoin = [], dLeav = [];

            labels.forEach(lbl => {
                let s = groupedStats[lbl];
                dTP.push(s.tp);
                dJoin.push(s.jn);
                dLeav.push(s.lv);

                dTPPct.push(s.tpC > 0 ? (s.tpP / s.tpC).toFixed(2) : 0);
                dAbs.push(s.abC > 0 ? (s.abP / s.abC).toFixed(2) : 0);
                dLev.push(s.leC > 0 ? (s.leP / s.leC).toFixed(2) : 0);
                dLat.push(s.laC > 0 ? (s.laP / s.laC).toFixed(2) : 0);
                dEar.push(s.eaC > 0 ? (s.eaP / s.eaC).toFixed(2) : 0);
                dAct.push(s.acC > 0 ? (s.acP / s.acC).toFixed(2) : 0);
            });

            // Update All 9 Chart Instances
            function updateC(chartInst, lbs, dta) {
                chartInst.data.labels = lbs;
                chartInst.data.datasets[0].data = dta;
                chartInst.update();
            }

            updateC(charts.tpotHours, labels, dTP);
            updateC(charts.tpotPct, labels, dTPPct);
            updateC(charts.absent, labels, dAbs);
            updateC(charts.leave, labels, dLev);
            updateC(charts.late, labels, dLat);
            updateC(charts.early, labels, dEar);
            updateC(charts.active, labels, dAct);
            updateC(charts.joiners, labels, dJoin);
            updateC(charts.leavers, labels, dLeav);
        }

        // Event Listeners
        document.getElementById('filterDept').addEventListener('change', () => {
            updateSectionDropdown(); 
            updateDashboard();       
        });

        document.getElementById('filterYear').addEventListener('change', updateDashboard);
        document.getElementById('filterMonth').addEventListener('change', updateDashboard);
        document.getElementById('filterSection').addEventListener('change', updateDashboard);

        document.getElementById('clearFiltersBtn').addEventListener('click', () => {
            document.querySelectorAll('select').forEach(select => select.value = 'All');
            updateSectionDropdown(); 
            updateDashboard(); 
        });
