<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Dashboard with Animated Charts</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: #f4f7f6; }
        
        /* Sidebar Styling */
        .sidebar { width: 260px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar h2 { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .filter-group select { width: 100%; padding: 10px; border-radius: 4px; border: none; outline: none; background: #fff; color: #333; }
        
        /* Main Content Styling */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .main-content h1 { color: #333; margin-top: 0; text-align: center; margin-bottom: 30px;}
        
        /* Charts Container */
        .charts-wrapper { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex: 1; min-width: 300px; max-width: 600px; }
        .chart-card h3 { text-align: center; color: #7f8c8d; margin-top: 0; }
        
        /* Chart Canvas Resize constraints */
        canvas { max-height: 350px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Filters</h2>
        <div class="filter-group"><label>Select Year</label><select id="yearDropdown"><option value="All">All Years</option></select></div>
        <div class="filter-group"><label>Select Month</label><select id="monthDropdown"><option value="All">All Months</option></select></div>
        <div class="filter-group"><label>Select Department</label><select id="departmentDropdown"><option value="All">All Departments</option></select></div>
        <div class="filter-group"><label>Select Section</label><select id="sectionDropdown"><option value="All">All Sections</option></select></div>
    </div>

    <div class="main-content">
        <h1>Employee Overtime Dashboard</h1>
        
        <div class="charts-wrapper">
            <div class="chart-card">
                <h3>Schedule vs Overtime Hours</h3>
                <canvas id="hoursChart"></canvas>
            </div>
            
            <div class="chart-card">
                <h3>Overtime Percentage</h3>
                <canvas id="percentChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const sheetCSVUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPcR5zF9y3FOUxNN1b5aiJDRlCjm-8Di1QzcP4BhzefQaeHpClaGeE4_bKkkPA27LqTOje4MoOKEen/pub?output=csv'; 
        let dashboardData = [];
        
        // Chart variables
        let hoursBarChart = null;
        let percentBarChart = null;

        Papa.parse(sheetCSVUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                dashboardData = results.data;
                initializeDashboard();
            }
        });

        function initializeDashboard() {
            populateDropdowns();
            initCharts(); // Charts ko pehli dafa draw karne ke liye
            calculateMetrics();

            // Event Listeners
            ['yearDropdown', 'monthDropdown', 'departmentDropdown', 'sectionDropdown'].forEach(id => {
                document.getElementById(id).addEventListener('change', calculateMetrics);
            });
        }

        function populateDropdowns() {
            let years = new Set(), months = new Set(), departments = new Set(), sections = new Set();

            dashboardData.forEach(row => {
                if(row.Year) years.add(row.Year.trim());
                if(row.Month) months.add(row.Month.trim());
                if(row.Department) departments.add(row.Department.trim());
                if(row.Section) sections.add(row.Section.trim());
            });

            const addOptions = (set, elementId) => {
                const dropdown = document.getElementById(elementId);
                set.forEach(item => dropdown.add(new Option(item, item)));
            };

            addOptions(years, 'yearDropdown');
            addOptions(months, 'monthDropdown');
            addOptions(departments, 'departmentDropdown');
            addOptions(sections, 'sectionDropdown');
        }

        // Initialize empty charts
        function initCharts() {
            const ctxHours = document.getElementById('hoursChart').getContext('2d');
            const ctxPercent = document.getElementById('percentChart').getContext('2d');

            // Setup for Hours Chart
            hoursBarChart = new Chart(ctxHours, {
                type: 'bar',
                data: {
                    labels: ['Schedule Hours', 'Overtime Hours'],
                    datasets: [{
                        label: 'Total Hours',
                        data: [0, 0],
                        backgroundColor: ['#3498db', '#e67e22'], // Blue and Orange
                        borderRadius: 6
                    }]
                },
                options: { responsive: true, animation: { duration: 1000, easing: 'easeOutQuart' } }
            });

            // Setup for Percentage Chart
            percentBarChart = new Chart(ctxPercent, {
                type: 'bar',
                data: {
                    labels: ['Overtime %'],
                    datasets: [{
                        label: 'Percentage',
                        data: [0],
                        backgroundColor: ['#e74c3c'], // Red
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 1000, easing: 'easeOutQuart' },
                    scales: { y: { beginAtZero: true, max: 100 } } // Y-axis 0 se 100 tak fix kar di hai
                }
            });
        }

        function calculateMetrics() {
            const selectedYear = document.getElementById('yearDropdown').value;
            const selectedMonth = document.getElementById('monthDropdown').value;
            const selectedDept = document.getElementById('departmentDropdown').value;
            const selectedSection = document.getElementById('sectionDropdown').value;

            let totalOvertimeHours = 0;
            let totalScheduleHours = 0;

            dashboardData.forEach(row => {
                let matchYear = (selectedYear === "All" || row.Year === selectedYear);
                let matchMonth = (selectedMonth === "All" || row.Month === selectedMonth);
                let matchDept = (selectedDept === "All" || row.Department === selectedDept);
                let matchSection = (selectedSection === "All" || row.Section === selectedSection);

                if (matchYear && matchMonth && matchDept && matchSection) {
                    let otHours = parseFloat(row['Overtime Hours']) || 0;
                    let scheduleHours = parseFloat(row['Schedule Hours']) || 0; 
                    totalOvertimeHours += otHours;
                    totalScheduleHours += scheduleHours;
                }
            });

            let otPercentage = totalScheduleHours > 0 ? (totalOvertimeHours / totalScheduleHours) * 100 : 0;

            // Update Chart Animations dynamically
            updateChartData(totalScheduleHours, totalOvertimeHours, otPercentage);
        }

        function updateChartData(schedule, overtime, percentage) {
            // Update Hours Chart
            hoursBarChart.data.datasets[0].data = [schedule.toFixed(2), overtime.toFixed(2)];
            hoursBarChart.update();

            // Update Percentage Chart
            percentBarChart.data.datasets[0].data = [percentage.toFixed(2)];
            percentBarChart.update();
        }
    </script>
</body>
</html>
