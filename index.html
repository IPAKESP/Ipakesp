<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overtime Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: #f4f7f6; }
        
        /* Sidebar Styling */
        .sidebar { width: 260px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar h2 { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .filter-group select { width: 100%; padding: 10px; border-radius: 4px; border: none; outline: none; background: #fff; color: #333; }
        
        /* Main Content Styling */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .main-content h1 { color: #333; margin-top: 0; }
        
        /* KPI Cards */
        .dashboard-cards { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 250px; text-align: center; border-top: 4px solid #3498db; }
        .card.percent { border-top-color: #e74c3c; }
        .card h3 { margin: 0 0 15px 0; color: #7f8c8d; font-size: 16px; text-transform: uppercase; }
        .card .value { font-size: 2.5em; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Filters</h2>
        
        <div class="filter-group">
            <label for="yearDropdown">Select Year</label>
            <select id="yearDropdown">
                <option value="All">All Years</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label for="monthDropdown">Select Month</label>
            <select id="monthDropdown">
                <option value="All">All Months</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="departmentDropdown">Select Department</label>
            <select id="departmentDropdown">
                <option value="All">All Departments</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label for="sectionDropdown">Select Section</label>
            <select id="sectionDropdown">
                <option value="All">All Sections</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <h1>Employee Overtime Dashboard</h1>
        
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Overtime (Hours)</h3>
                <div class="value" id="otHoursDisplay">0</div>
            </div>
            
            <div class="card percent">
                <h3>Overtime Percentage</h3>
                <div class="value" id="otPercentDisplay">0%</div>
            </div>
        </div>
    </div>

    <script>
        const sheetCSVUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPcR5zF9y3FOUxNN1b5aiJDRlCjm-8Di1QzcP4BhzefQaeHpClaGeE4_bKkkPA27LqTOje4MoOKEen/pub?output=csv'; 
        let dashboardData = [];

        // Fetch data from Google Sheets
        Papa.parse(sheetCSVUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                dashboardData = results.data;
                initializeDashboard();
            },
            error: function(error) {
                console.error("Error fetching data:", error);
                alert("Data load nahi ho saka.");
            }
        });

        function initializeDashboard() {
            populateDropdowns();
            calculateMetrics();

            // Event Listeners for all dropdowns
            document.getElementById('yearDropdown').addEventListener('change', calculateMetrics);
            document.getElementById('monthDropdown').addEventListener('change', calculateMetrics);
            document.getElementById('departmentDropdown').addEventListener('change', calculateMetrics);
            document.getElementById('sectionDropdown').addEventListener('change', calculateMetrics);
        }

        function populateDropdowns() {
            let years = new Set();
            let months = new Set();
            let departments = new Set();
            let sections = new Set();

            // Extract unique values from data
            dashboardData.forEach(row => {
                if(row.Year) years.add(row.Year.trim());
                if(row.Month) months.add(row.Month.trim());
                if(row.Department) departments.add(row.Department.trim());
                if(row.Section) sections.add(row.Section.trim());
            });

            // Populate Year
            const yearDropdown = document.getElementById('yearDropdown');
            years.forEach(year => yearDropdown.add(new Option(year, year)));

            // Populate Month
            const monthDropdown = document.getElementById('monthDropdown');
            months.forEach(month => monthDropdown.add(new Option(month, month)));

            // Populate Department
            const deptDropdown = document.getElementById('departmentDropdown');
            departments.forEach(dept => deptDropdown.add(new Option(dept, dept)));

            // Populate Section
            const sectionDropdown = document.getElementById('sectionDropdown');
            sections.forEach(sec => sectionDropdown.add(new Option(sec, sec)));
        }

        function calculateMetrics() {
            const selectedYear = document.getElementById('yearDropdown').value;
            const selectedMonth = document.getElementById('monthDropdown').value;
            const selectedDept = document.getElementById('departmentDropdown').value;
            const selectedSection = document.getElementById('sectionDropdown').value;

            let totalOvertimeHours = 0;
            let totalScheduleHours = 0;

            dashboardData.forEach(row => {
                // Logical Check: Agar "All" select hai, ya phir exact value match ho rahi hai
                let matchYear = (selectedYear === "All" || row.Year === selectedYear);
                let matchMonth = (selectedMonth === "All" || row.Month === selectedMonth);
                let matchDept = (selectedDept === "All" || row.Department === selectedDept);
                let matchSection = (selectedSection === "All" || row.Section === selectedSection);

                // Agar sab conditions true hain, toh hi calculation mein add karo (Accumulated logic)
                if (matchYear && matchMonth && matchDept && matchSection) {
                    
                    // Column names match karna zaroori hai Google Sheet ke headings ke sath
                    let otHours = parseFloat(row['Overtime Hours']) || 0;
                    let scheduleHours = parseFloat(row['Schedule Hours']) || 0; 

                    totalOvertimeHours += otHours;
                    totalScheduleHours += scheduleHours;
                }
            });

            // Calculate Overtime Percentage based on your formula
            // (Total Overtime Hours / Total Schedule Hours) * 100
            let otPercentage = 0;
            if (totalScheduleHours > 0) {
                otPercentage = (totalOvertimeHours / totalScheduleHours) * 100;
            }

            // Update UI
            document.getElementById('otHoursDisplay').innerText = totalOvertimeHours.toFixed(2);
            document.getElementById('otPercentDisplay').innerText = otPercentage.toFixed(2) + "%";
        }
    </script>
</body>
</html>
